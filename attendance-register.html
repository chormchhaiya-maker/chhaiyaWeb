<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Attendance Register</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f4f1eb;
  --surface: #ffffff;
  --surface2: #faf8f4;
  --border: #e2ddd4;
  --ink: #1a1714;
  --ink2: #5c5650;
  --ink3: #9c958e;
  --green: #2d6a4f;
  --green-light: #d8f3dc;
  --red: #c1121f;
  --red-light: #ffe5e5;
  --gold: #b5830a;
  --gold-light: #fff3cd;
  --blue: #1d5fa4;
  --blue-light: #dbeafe;
  --accent: #c94b1e;
}

body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'Outfit', sans-serif;
  min-height: 100vh;
  padding: 32px 16px 64px;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: 
    repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(0,0,0,0.04) 39px, rgba(0,0,0,0.04) 40px),
    repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(0,0,0,0.02) 39px, rgba(0,0,0,0.02) 40px);
  pointer-events: none;
  z-index: 0;
}

.wrap { max-width: 900px; margin: 0 auto; position: relative; z-index: 1; }

/* Header */
.header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 36px;
  flex-wrap: wrap;
  gap: 16px;
}

.header-left {}

.stamp {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--accent);
  color: #fff;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  padding: 5px 12px;
  border-radius: 2px;
  margin-bottom: 10px;
}

h1 {
  font-size: clamp(28px, 6vw, 48px);
  font-weight: 800;
  letter-spacing: -1.5px;
  line-height: 1;
  color: var(--ink);
}

h1 em { color: var(--accent); font-style: normal; }

.date-display {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--ink3);
  margin-top: 8px;
}

.stats-row {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}

.stat-box {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  padding: 14px 20px;
  text-align: center;
  min-width: 80px;
}

.stat-num {
  font-size: 24px;
  font-weight: 800;
  line-height: 1;
  font-family: 'JetBrains Mono', monospace;
}

.stat-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--ink3);
  margin-top: 4px;
}

.stat-box.present .stat-num { color: var(--green); }
.stat-box.absent .stat-num { color: var(--red); }
.stat-box.total .stat-num { color: var(--blue); }

/* Form Card */
.form-card {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 16px;
  padding: 28px;
  margin-bottom: 28px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
}

.form-title {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--ink3);
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.form-title::before {
  content: '';
  width: 3px; height: 14px;
  background: var(--accent);
  border-radius: 2px;
  display: inline-block;
}

.form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}

@media (max-width: 500px) { .form-grid { grid-template-columns: 1fr; } }

.field { display: flex; flex-direction: column; gap: 6px; }
.field.full { grid-column: 1 / -1; }

label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--ink2);
}

input[type="text"], input[type="date"], select {
  background: var(--surface2);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 11px 14px;
  font-family: 'Outfit', sans-serif;
  font-size: 14px;
  color: var(--ink);
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  width: 100%;
}

input[type="text"]:focus, input[type="date"]:focus, select:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(201,75,30,0.1);
  background: #fff;
}

select { cursor: pointer; }

.gender-group {
  display: flex;
  gap: 10px;
}

.gender-btn {
  flex: 1;
  padding: 10px;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  background: var(--surface2);
  font-family: 'Outfit', sans-serif;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  color: var(--ink2);
  text-align: center;
}

.gender-btn.active-male {
  border-color: var(--blue);
  background: var(--blue-light);
  color: var(--blue);
}

.gender-btn.active-female {
  border-color: #be185d;
  background: #fce7f3;
  color: #be185d;
}

.add-btn {
  width: 100%;
  margin-top: 20px;
  background: var(--ink);
  color: #fff;
  border: none;
  border-radius: 10px;
  padding: 14px;
  font-family: 'Outfit', sans-serif;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 0.3px;
  transition: background 0.2s, transform 0.1s;
}

.add-btn:hover { background: var(--accent); transform: translateY(-1px); }
.add-btn:active { transform: translateY(0); }

/* Table */
.table-card {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
}

.table-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 24px;
  border-bottom: 1.5px solid var(--border);
  flex-wrap: wrap;
  gap: 12px;
}

.table-title {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--ink3);
  display: flex;
  align-items: center;
  gap: 8px;
}

.table-title::before {
  content: '';
  width: 3px; height: 14px;
  background: var(--green);
  border-radius: 2px;
  display: inline-block;
}

.search-box {
  background: var(--surface2);
  border: 1.5px solid var(--border);
  border-radius: 8px;
  padding: 8px 14px;
  font-family: 'Outfit', sans-serif;
  font-size: 13px;
  color: var(--ink);
  outline: none;
  width: 200px;
  transition: border-color 0.2s;
}

.search-box:focus { border-color: var(--accent); }

.table-wrap { overflow-x: auto; }

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13.5px;
}

thead th {
  background: var(--surface2);
  padding: 12px 16px;
  text-align: left;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--ink3);
  border-bottom: 1.5px solid var(--border);
  white-space: nowrap;
}

tbody tr {
  border-bottom: 1px solid var(--border);
  transition: background 0.15s;
}

tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: var(--surface2); }

td {
  padding: 13px 16px;
  vertical-align: middle;
  white-space: nowrap;
}

.num-cell {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--ink3);
  font-weight: 600;
}

.name-cell { font-weight: 600; color: var(--ink); }

.dob-cell {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--ink2);
}

.gender-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 700;
}

.gender-m { background: var(--blue-light); color: var(--blue); }
.gender-f { background: #fce7f3; color: #be185d; }

/* Attendance checkbox */
.attend-cell { text-align: center; }

.check-wrap {
  display: inline-flex;
  align-items: center;
  justify-content: center;
}

.attend-check {
  width: 26px; height: 26px;
  border: 2px solid var(--border);
  border-radius: 6px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  background: var(--surface2);
  font-size: 14px;
  user-select: none;
}

.attend-check.present {
  background: var(--green-light);
  border-color: var(--green);
  color: var(--green);
}

.attend-check.absent {
  background: var(--red-light);
  border-color: var(--red);
  color: var(--red);
}

.status-badge {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.3px;
}

.status-present { background: var(--green-light); color: var(--green); }
.status-absent { background: var(--red-light); color: var(--red); }
.status-none { background: var(--gold-light); color: var(--gold); }

.del-btn {
  background: none;
  border: 1.5px solid var(--border);
  color: var(--ink3);
  width: 28px; height: 28px;
  border-radius: 7px;
  cursor: pointer;
  font-size: 13px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}

.del-btn:hover { border-color: var(--red); color: var(--red); background: var(--red-light); }

.empty-row td {
  text-align: center;
  padding: 48px;
  color: var(--ink3);
  font-size: 14px;
}

.empty-icon { font-size: 32px; display: block; margin-bottom: 8px; }

/* Toast */
.toast {
  position: fixed;
  bottom: 24px; right: 24px;
  background: var(--ink);
  color: #fff;
  padding: 12px 20px;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 500;
  box-shadow: 0 8px 24px rgba(0,0,0,0.2);
  transform: translateY(80px);
  opacity: 0;
  transition: all 0.3s ease;
  z-index: 999;
}

.toast.show { transform: translateY(0); opacity: 1; }

/* Animations */
@keyframes rowIn {
  from { opacity: 0; transform: translateY(-8px); }
  to { opacity: 1; transform: translateY(0); }
}

tr.new-row { animation: rowIn 0.3s ease forwards; }
</style>
</head>
<body>
<div class="wrap">

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <div class="stamp">📋 Attendance Register</div>
      <h1>Class <em>Roll</em><br>Book</h1>
      <div class="date-display" id="dateDisplay"></div>
    </div>
    <div class="stats-row">
      <div class="stat-box total">
        <div class="stat-num" id="statTotal">0</div>
        <div class="stat-label">Total</div>
      </div>
      <div class="stat-box present">
        <div class="stat-num" id="statPresent">0</div>
        <div class="stat-label">Present</div>
      </div>
      <div class="stat-box absent">
        <div class="stat-num" id="statAbsent">0</div>
        <div class="stat-label">Absent</div>
      </div>
    </div>
  </div>

  <!-- Add Student Form -->
  <div class="form-card">
    <div class="form-title">Add New Student</div>
    <div class="form-grid">
      <div class="field">
        <label>Full Name</label>
        <input type="text" id="inputName" placeholder="e.g. Sovannara Dara" maxlength="50" />
      </div>
      <div class="field">
        <label>Date of Birth</label>
        <input type="date" id="inputDob" />
      </div>
      <div class="field">
        <label>Gender</label>
        <div class="gender-group">
          <button class="gender-btn" id="btnMale" onclick="selectGender('Male')">♂ Male</button>
          <button class="gender-btn" id="btnFemale" onclick="selectGender('Female')">♀ Female</button>
        </div>
      </div>
      <div class="field">
        <label>Attendance</label>
        <select id="inputAttend">
          <option value="">— Not marked yet —</option>
          <option value="Present">✅ Present</option>
          <option value="Absent">❌ Absent</option>
        </select>
      </div>
    </div>
    <button class="add-btn" onclick="addStudent()">+ Add Student to Register</button>
  </div>

  <!-- Table -->
  <div class="table-card">
    <div class="table-header">
      <div class="table-title">Student List</div>
      <input class="search-box" type="text" id="searchBox" placeholder="🔍 Search name..." oninput="renderTable()" />
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Full Name</th>
            <th>Date of Birth</th>
            <th>Age</th>
            <th>Gender</th>
            <th style="text-align:center">✔ Attended</th>
            <th>Status</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
  let students = JSON.parse(localStorage.getItem('attendanceStudents') || '[]');
  let selectedGender = '';

  // Date display
  const now = new Date();
  document.getElementById('dateDisplay').textContent =
    now.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

  function selectGender(g) {
    selectedGender = g;
    document.getElementById('btnMale').className = 'gender-btn' + (g === 'Male' ? ' active-male' : '');
    document.getElementById('btnFemale').className = 'gender-btn' + (g === 'Female' ? ' active-female' : '');
  }

  function calcAge(dob) {
    if (!dob) return '—';
    const b = new Date(dob);
    const diff = Date.now() - b.getTime();
    return Math.floor(diff / (1000 * 60 * 60 * 24 * 365.25));
  }

  function formatDob(dob) {
    if (!dob) return '—';
    const d = new Date(dob + 'T00:00:00');
    return d.toLocaleDateString('en-US', { day: '2-digit', month: 'short', year: 'numeric' });
  }

  function save() {
    localStorage.setItem('attendanceStudents', JSON.stringify(students));
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2400);
  }

  function addStudent() {
    const name = document.getElementById('inputName').value.trim();
    const dob = document.getElementById('inputDob').value;
    const attend = document.getElementById('inputAttend').value;

    if (!name) { showToast('⚠️ Please enter a name'); return; }
    if (!selectedGender) { showToast('⚠️ Please select gender'); return; }

    students.push({
      id: Date.now(),
      name,
      dob,
      gender: selectedGender,
      attendance: attend,
      checked: attend === 'Present'
    });

    save();
    renderTable();
    updateStats();

    // Reset
    document.getElementById('inputName').value = '';
    document.getElementById('inputDob').value = '';
    document.getElementById('inputAttend').value = '';
    selectGender('');
    selectedGender = '';

    showToast('✅ ' + name + ' added!');
  }

  function toggleCheck(id) {
    const s = students.find(x => x.id === id);
    if (!s) return;
    if (!s.checked && s.attendance !== 'Present') {
      s.checked = true;
      s.attendance = 'Present';
    } else if (s.checked) {
      s.checked = false;
      s.attendance = 'Absent';
    } else {
      s.checked = true;
      s.attendance = 'Present';
    }
    save();
    renderTable();
    updateStats();
  }

  function deleteStudent(id) {
    const s = students.find(x => x.id === id);
    if (!s) return;
    if (confirm('Remove ' + s.name + ' from the register?')) {
      students = students.filter(x => x.id !== id);
      save();
      renderTable();
      updateStats();
      showToast('🗑️ Removed ' + s.name);
    }
  }

  function updateStats() {
    const total = students.length;
    const present = students.filter(s => s.attendance === 'Present').length;
    const absent = students.filter(s => s.attendance === 'Absent').length;
    document.getElementById('statTotal').textContent = total;
    document.getElementById('statPresent').textContent = present;
    document.getElementById('statAbsent').textContent = absent;
  }

  function renderTable() {
    const q = document.getElementById('searchBox').value.toLowerCase();
    const filtered = students.filter(s => s.name.toLowerCase().includes(q));
    const tbody = document.getElementById('tableBody');

    if (filtered.length === 0) {
      tbody.innerHTML = `<tr class="empty-row"><td colspan="8">
        <span class="empty-icon">📭</span>
        ${students.length === 0 ? 'No students yet. Add one above!' : 'No results found.'}
      </td></tr>`;
      return;
    }

    tbody.innerHTML = filtered.map((s, i) => {
      const checkClass = s.checked ? 'attend-check present' : 
                         s.attendance === 'Absent' ? 'attend-check absent' : 'attend-check';
      const checkIcon = s.checked ? '✓' : s.attendance === 'Absent' ? '✗' : '';
      const statusClass = s.attendance === 'Present' ? 'status-present' :
                          s.attendance === 'Absent' ? 'status-absent' : 'status-none';
      const statusText = s.attendance || 'Pending';
      const genderClass = s.gender === 'Male' ? 'gender-m' : 'gender-f';
      const genderIcon = s.gender === 'Male' ? '♂' : '♀';

      return `<tr>
        <td class="num-cell">${i + 1}</td>
        <td class="name-cell">${escapeHtml(s.name)}</td>
        <td class="dob-cell">${formatDob(s.dob)}</td>
        <td class="dob-cell">${calcAge(s.dob)}</td>
        <td><span class="gender-badge ${genderClass}">${genderIcon} ${s.gender}</span></td>
        <td class="attend-cell">
          <div class="check-wrap">
            <div class="${checkClass}" onclick="toggleCheck(${s.id})" title="Click to toggle attendance">${checkIcon}</div>
          </div>
        </td>
        <td><span class="status-badge ${statusClass}">${statusText}</span></td>
        <td><button class="del-btn" onclick="deleteStudent(${s.id})" title="Remove">✕</button></td>
      </tr>`;
    }).join('');
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  document.getElementById('inputName').addEventListener('keydown', e => {
    if (e.key === 'Enter') addStudent();
  });

  renderTable();
  updateStats();
</script>
</body>
</html>

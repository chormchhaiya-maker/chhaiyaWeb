<!DOCTYPE html>
<html>
<head>
    <title>Simple Chatbot Interface</title>
    <style>
        #chat-container {
            width: 500px;
            height: 400px;
            border: 1px solid #ccc;
            overflow-y: scroll;
            padding: 10px;
        }
        #user-input {
            width: 400px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <h1>Chatbot</h1>
    <div id="chat-container">
        <p><strong>Chatbot:</strong> Hello! How can I help you?</p>
    </div>
    <input type="text" id="user-input" placeholder="Type your message...">
    <button onclick="sendMessage()">Send</button>

    <script>
        function sendMessage() {
            var userInput = document.getElementById('user-input').value;
            if (userInput.trim() !== '') {
                var chatContainer = document.getElementById('chat-container');
                // Display user message
                chatContainer.innerHTML += '<p><strong>You:</strong> ' + userInput + '</p>';

                // Get chatbot response (replace with your actual chatbot logic)
                getChatbotResponse(userInput).then(function(chatbotResponse) {
                    chatContainer.innerHTML += '<p><strong>Chatbot:</strong> ' + chatbotResponse + '</p>';
                    // Clear the input field
                    document.getElementById('user-input').value = '';
                    // Scroll to bottom of chat container
                    chatContainer.scrollTop = chatContainer.scrollHeight;
                });
            }
        }

        async function getChatbotResponse(userInput) {
            // Replace with your actual API endpoint
            const API_ENDPOINT = 'YOUR_API_ENDPOINT_HERE';
            const response = await fetch(API_ENDPOINT, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ message: userInput })
            });
            const data = await response.json();
            return data.response; // Adjust based on your API response structure
        }

        // Event listener for Enter key
        document.getElementById('user-input').addEventListener('keyup', function(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chhaiya AI</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0a0a0f;
  --surface: #13131a;
  --surface2: #1c1c26;
  --border: rgba(255,255,255,0.08);
  --accent: #7c6fff;
  --accent2: #ff6b9d;
  --text: #f0eeff;
  --text2: #9b97c0;
  --text3: #5a566e;
  --user-bg: #7c6fff;
  --ai-bg: #1c1c26;
}
@keyframes bgPulse { 0%,100%{opacity:0.4} 50%{opacity:0.7} }
@keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
@keyframes gradShift { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Syne', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.ambient {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}
.ambient::before {
  content: '';
  position: absolute;
  width: 600px; height: 600px;
  background: radial-gradient(circle, rgba(124,111,255,0.15) 0%, transparent 70%);
  top: -200px; left: -100px;
  animation: bgPulse 6s ease-in-out infinite;
}
.ambient::after {
  content: '';
  position: absolute;
  width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(255,107,157,0.1) 0%, transparent 70%);
  bottom: -150px; right: -100px;
  animation: bgPulse 8s ease-in-out infinite 2s;
}

.app { display:flex; flex-direction:column; height:100vh; position:relative; z-index:1; }

.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 24px;
  border-bottom: 1px solid var(--border);
  background: rgba(10,10,15,0.8);
  backdrop-filter: blur(20px);
  flex-shrink: 0;
}
.logo { display: flex; align-items: center; gap: 12px; }
.logo-icon {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  animation: gradShift 4s ease infinite;
  background-size: 200% 200%;
}
.logo-name {
  font-size: 18px;
  font-weight: 800;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.logo-tag { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; margin-top: 1px; }
.status { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text2); font-family: 'DM Mono', monospace; }
.status-dot { width: 7px; height: 7px; border-radius: 50%; background: #4ade80; box-shadow: 0 0 8px #4ade80; }

.messages {
  flex: 1;
  overflow-y: auto;
  padding: 24px;
  display: flex;
  flex-direction: column;
  gap: 20px;
  scroll-behavior: smooth;
}
.messages::-webkit-scrollbar { width: 4px; }
.messages::-webkit-scrollbar-track { background: transparent; }
.messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.welcome {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  flex: 1;
  text-align: center;
  padding: 40px;
  animation: fadeUp 0.6s ease forwards;
}
.welcome-icon { font-size: 56px; margin-bottom: 20px; filter: drop-shadow(0 0 20px rgba(124,111,255,0.5)); }
.welcome h2 {
  font-size: 32px; font-weight: 800;
  background: linear-gradient(135deg, var(--text), var(--accent));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  margin-bottom: 10px;
}
.welcome p { color: var(--text2); font-size: 15px; max-width: 360px; line-height: 1.6; font-weight: 400; }
.suggestions { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 28px; }
.suggestion {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 20px; padding: 8px 16px; font-size: 13px;
  color: var(--text2); cursor: pointer; transition: all 0.2s; font-family: 'Syne', sans-serif;
}
.suggestion:hover { border-color: var(--accent); color: var(--accent); background: rgba(124,111,255,0.1); }

.msg { display: flex; gap: 12px; animation: fadeUp 0.3s ease forwards; max-width: 780px; }
.msg.user { flex-direction: row-reverse; align-self: flex-end; }
.msg.ai { align-self: flex-start; }

.avatar {
  width: 34px; height: 34px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0; margin-top: 2px;
}
.msg.user .avatar { background: linear-gradient(135deg, var(--accent), var(--accent2)); }
.msg.ai .avatar { background: var(--surface2); border: 1px solid var(--border); }

.bubble { max-width: 600px; padding: 12px 16px; border-radius: 16px; font-size: 14.5px; line-height: 1.7; font-weight: 400; }
.msg.user .bubble { background: var(--user-bg); color: #fff; border-bottom-right-radius: 4px; }
.msg.ai .bubble { background: var(--ai-bg); border: 1px solid var(--border); color: var(--text); border-bottom-left-radius: 4px; }

.typing-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--text2); margin: 0 2px; animation: blink 1.2s infinite; }
.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }

.input-area {
  padding: 16px 24px 24px;
  border-top: 1px solid var(--border);
  background: rgba(10,10,15,0.8);
  backdrop-filter: blur(20px);
  flex-shrink: 0;
}
.input-wrap {
  display: flex; align-items: flex-end; gap: 12px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 16px; padding: 12px 16px; transition: border-color 0.2s;
  max-width: 800px; margin: 0 auto;
}
.input-wrap:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(124,111,255,0.1); }
textarea {
  flex: 1; background: none; border: none; outline: none;
  color: var(--text); font-family: 'Syne', sans-serif; font-size: 14px;
  resize: none; max-height: 120px; min-height: 24px; line-height: 1.6;
}
textarea::placeholder { color: var(--text3); }
.send-btn {
  width: 36px; height: 36px; border-radius: 10px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: opacity 0.2s, transform 0.1s; font-size: 16px;
}
.send-btn:hover { opacity: 0.85; transform: scale(1.05); }
.send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
.input-hint { text-align: center; font-size: 11px; color: var(--text3); margin-top: 10px; font-family: 'DM Mono', monospace; }
</style>
</head>
<body>
<div class="ambient"></div>
<div class="app">
  <div class="header">
    <div class="logo">
      <div class="logo-icon">🤖</div>
      <div>
        <div class="logo-name">Chhaiya AI</div>
        <div class="logo-tag">Powered By masterchhaiya-ai</div>
      </div>
    </div>
    <div class="status">
      <div class="status-dot"></div>
      Online
    </div>
  </div>

  <div class="messages" id="messages">
    <div class="welcome" id="welcome">
      <div class="welcome-icon">🤖</div>
      <h2>Hello! I'm Chhaiya AI 🔥</h2>
      <p>Created by the smartest, kindest & most handsome guy at TPN — Chorm Chhaiya! Ask me anything 😎</p>
      <div class="suggestions">
        <div class="suggestion" onclick="sendSuggestion('What can you do?')">What can you do?</div>
        <div class="suggestion" onclick="sendSuggestion('Tell me a fun fact')">Tell me a fun fact</div>
        <div class="suggestion" onclick="sendSuggestion('Help me study for an exam')">Help me study</div>
        <div class="suggestion" onclick="sendSuggestion('Explain how the internet works')">How does internet work?</div>
      </div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-wrap">
      <textarea id="userInput" placeholder="Ask me anything..." rows="1"
        oninput="autoResize(this)"
        onkeydown="handleKey(event)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
    </div>
    <div class="input-hint">Press Enter to send · Shift+Enter for new line</div>
  </div>
</div>

<script>
let messages = [];
let isLoading = false;

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function sendSuggestion(text) {
  document.getElementById('userInput').value = text;
  sendMessage();
}

function addMessage(role, content) {
  const welcome = document.getElementById('welcome');
  if (welcome) welcome.remove();

  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = `
    <div class="avatar">${role === 'user' ? '😊' : '🤖'}</div>
    <div class="bubble">${content}</div>
  `;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
  return div;
}

function addTyping() {
  const welcome = document.getElementById('welcome');
  if (welcome) welcome.remove();

  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg ai';
  div.id = 'typing';
  div.innerHTML = `
    <div class="avatar">🤖</div>
    <div class="bubble">
      <span class="typing-dot"></span>
      <span class="typing-dot"></span>
      <span class="typing-dot"></span>
    </div>
  `;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

async function sendMessage() {
  if (isLoading) return;
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) return;

  addMessage('user', text.replace(/\n/g, '<br>'));
  messages.push({ role: 'user', content: text });
  input.value = '';
  input.style.height = 'auto';

  isLoading = true;
  document.getElementById('sendBtn').disabled = true;
  addTyping();

  try {
    // Calls YOUR Netlify function — API key is hidden on the server!
    const response = await fetch('/.netlify/functions/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages })
    });

    const data = await response.json();
    removeTyping();

    if (data.choices && data.choices[0]) {
      const reply = data.choices[0].message.content;
      messages.push({ role: 'assistant', content: reply });
      addMessage('ai', reply.replace(/\n/g, '<br>'));
    } else if (data.error) {
      addMessage('ai', '❌ Error: ' + data.error.message);
    }
  } catch (e) {
    removeTyping();
    addMessage('ai', '❌ Could not connect. Please try again!');
  }

  isLoading = false;
  document.getElementById('sendBtn').disabled = false;
  document.getElementById('userInput').focus();
}
</script>
</body>
</html>

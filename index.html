<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chhaiya AI</title>
<meta name="description" content="AI assistant by ChhaiyaDeveloper">
<meta name="theme-color" content="#7c6fff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Chhaiya AI">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="https://img.icons8.com/fluency/96/bot.png">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1389812823230326" crossorigin="anonymous"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0a0a0f;
  --surface: #13131a;
  --surface2: #1c1c26;
  --border: rgba(255,255,255,0.08);
  --accent: #7c6fff;
  --accent2: #ff6b9d;
  --text: #f0eeff;
  --text2: #9b97c0;
  --text3: #5a566e;
}
@keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
@keyframes gradShift { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
@keyframes scanline { 0%{transform:translateY(-100%)} 100%{transform:translateY(100vh)} }
@keyframes glitch { 0%,90%,100%{transform:translate(0)} 92%{transform:translate(-2px,1px)} 94%{transform:translate(2px,-1px)} 96%{transform:translate(-1px,2px)} }
@keyframes pulse { 0%,100%{box-shadow:0 0 8px #4ade80} 50%{box-shadow:0 0 16px #4ade80, 0 0 30px #4ade80} }

body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; min-height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

/* DIGITAL BACKGROUND */
#matrix-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; opacity: 0.18; pointer-events: none; }

.grid-overlay {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image: linear-gradient(rgba(124,111,255,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(124,111,255,0.04) 1px, transparent 1px);
  background-size: 40px 40px;
}

.scanline {
  position: fixed; top: 0; left: 0; width: 100%; height: 3px;
  background: linear-gradient(transparent, rgba(124,111,255,0.15), transparent);
  z-index: 1; pointer-events: none;
  animation: scanline 6s linear infinite;
}

.corner-decoration {
  position: fixed; width: 60px; height: 60px; z-index: 1; pointer-events: none;
}
.corner-decoration.tl { top: 12px; left: 12px; border-top: 1px solid rgba(124,111,255,0.4); border-left: 1px solid rgba(124,111,255,0.4); }
.corner-decoration.tr { top: 12px; right: 12px; border-top: 1px solid rgba(255,107,157,0.4); border-right: 1px solid rgba(255,107,157,0.4); }
.corner-decoration.bl { bottom: 12px; left: 12px; border-bottom: 1px solid rgba(124,111,255,0.4); border-left: 1px solid rgba(124,111,255,0.4); }
.corner-decoration.br { bottom: 12px; right: 12px; border-bottom: 1px solid rgba(255,107,157,0.4); border-right: 1px solid rgba(255,107,157,0.4); }

.app { display: flex; flex-direction: column; height: 100vh; position: relative; z-index: 2; }

.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 24px; border-bottom: 1px solid var(--border);
  background: rgba(10,10,15,0.85); backdrop-filter: blur(20px); flex-shrink: 0;
}
.logo { display: flex; align-items: center; gap: 12px; }
.logo-icon {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border-radius: 10px; display: flex; align-items: center; justify-content: center;
  font-size: 18px; animation: gradShift 4s ease infinite, glitch 8s infinite;
  background-size: 200% 200%;
}
.logo-name {
  font-size: 18px; font-weight: 800;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  animation: glitch 10s infinite;
}
.logo-tag { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; margin-top: 1px; }
.status { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text2); font-family: 'DM Mono', monospace; }
.status-dot { width: 7px; height: 7px; border-radius: 50%; background: #4ade80; animation: pulse 2s infinite; }

.messages { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 20px; scroll-behavior: smooth; }
.messages::-webkit-scrollbar { width: 4px; }
.messages::-webkit-scrollbar-thumb { background: rgba(124,111,255,0.3); border-radius: 2px; }

.welcome { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; text-align: center; padding: 40px; animation: fadeUp 0.6s ease forwards; }
.welcome-icon { font-size: 56px; margin-bottom: 20px; filter: drop-shadow(0 0 20px rgba(124,111,255,0.8)) drop-shadow(0 0 40px rgba(124,111,255,0.4)); }
.welcome h2 {
  font-size: 32px; font-weight: 800;
  background: linear-gradient(135deg, var(--text), var(--accent));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  margin-bottom: 10px; animation: glitch 12s infinite;
}
.welcome p { color: var(--text2); font-size: 15px; max-width: 360px; line-height: 1.6; font-weight: 400; }
.suggestions { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 28px; }
.suggestion {
  background: rgba(28,28,38,0.8); border: 1px solid rgba(124,111,255,0.2);
  border-radius: 20px; padding: 8px 16px; font-size: 13px;
  color: var(--text2); cursor: pointer; transition: all 0.2s; font-family: 'Syne', sans-serif;
  backdrop-filter: blur(10px);
}
.suggestion:hover { border-color: var(--accent); color: var(--accent); background: rgba(124,111,255,0.1); box-shadow: 0 0 15px rgba(124,111,255,0.2); }

.msg { display: flex; gap: 12px; animation: fadeUp 0.3s ease forwards; max-width: 780px; }
.msg.user { flex-direction: row-reverse; align-self: flex-end; }
.msg.ai { align-self: flex-start; }

.avatar { width: 34px; height: 34px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; margin-top: 2px; }
.msg.user .avatar { background: linear-gradient(135deg, var(--accent), var(--accent2)); }
.msg.ai .avatar { background: var(--surface2); border: 1px solid rgba(124,111,255,0.3); box-shadow: 0 0 10px rgba(124,111,255,0.2); }

.bubble { max-width: 600px; padding: 12px 16px; border-radius: 16px; font-size: 14.5px; line-height: 1.7; font-weight: 400; word-break: break-word; }
.msg.user .bubble { background: linear-gradient(135deg, var(--accent), #6b5de0); color: #fff; border-bottom-right-radius: 4px; box-shadow: 0 0 20px rgba(124,111,255,0.3); }
.msg.ai .bubble { background: rgba(28,28,38,0.9); border: 1px solid rgba(124,111,255,0.15); color: var(--text); border-bottom-left-radius: 4px; backdrop-filter: blur(10px); }

.typing-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--accent); margin: 0 2px; animation: blink 1.2s infinite; box-shadow: 0 0 6px var(--accent); }
.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }

.input-area { padding: 16px 24px 24px; border-top: 1px solid var(--border); background: rgba(10,10,15,0.85); backdrop-filter: blur(20px); flex-shrink: 0; }
.input-wrap {
  display: flex; align-items: flex-end; gap: 12px;
  background: rgba(28,28,38,0.9); border: 1px solid rgba(124,111,255,0.2);
  border-radius: 16px; padding: 12px 16px; transition: border-color 0.2s, box-shadow 0.2s;
  max-width: 800px; margin: 0 auto; backdrop-filter: blur(10px);
}
.input-wrap:focus-within { border-color: var(--accent); box-shadow: 0 0 20px rgba(124,111,255,0.2); }
textarea { flex: 1; background: none; border: none; outline: none; color: var(--text); font-family: 'Syne', sans-serif; font-size: 14px; resize: none; max-height: 120px; min-height: 24px; line-height: 1.6; }
textarea::placeholder { color: var(--text3); }
.send-btn {
  width: 36px; height: 36px; border-radius: 10px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border: none; cursor: pointer; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: opacity 0.2s, transform 0.1s, box-shadow 0.2s; font-size: 16px;
}
.send-btn:hover { opacity: 0.85; transform: scale(1.05); box-shadow: 0 0 20px rgba(124,111,255,0.5); }
.send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }
.input-hint { text-align: center; font-size: 11px; color: var(--text3); margin-top: 10px; font-family: 'DM Mono', monospace; }
</style>
</head>
<body>

<!-- Digital BG -->
<canvas id="matrix-canvas"></canvas>
<div class="grid-overlay"></div>
<div class="scanline"></div>
<div class="corner-decoration tl"></div>
<div class="corner-decoration tr"></div>
<div class="corner-decoration bl"></div>
<div class="corner-decoration br"></div>

<div class="app">
  <div class="header">
    <div class="logo">
      <div class="logo-icon">🤖</div>
      <div>
        <div class="logo-name">Chhaiya AI</div>
        <div class="logo-tag">Powered By masterchhaiya-ai</div>
      </div>
    </div>
    <div class="status"><div class="status-dot"></div> Online</div>
  </div>

  <div class="messages" id="messages">
    <div class="welcome" id="welcome">
      <div class="welcome-icon">🤖</div>
      <h2>Hello! I'm Chhaiya AI 🔥</h2>
      <p>Created by ChhaiyaDeveloper-AI 😎</p>
      <div class="suggestions">
        <div class="suggestion" onclick="sendSuggestion('What can you do?')">What can you do?</div>
        <div class="suggestion" onclick="sendSuggestion('Tell me a fun fact')">Tell me a fun fact</div>
        <div class="suggestion" onclick="sendSuggestion('Help me study for an exam')">Help me study</div>
        <div class="suggestion" onclick="sendSuggestion('Explain how the internet works')">How does internet work?</div>
        <div class="suggestion" onclick="sendSuggestion('generate a beautiful sunset over mountains')">🎨 Generate image</div>
        <div class="suggestion" onclick="sendSuggestion('draw a cute cat')">🐱 Draw a cat</div>
      </div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-wrap">
      <textarea id="userInput" placeholder="Ask me anything..." rows="1" oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
    </div>
    <div class="input-hint">Press Enter to send · Shift+Enter for new line</div>
  </div>
</div>

<script>
// ── MATRIX RAIN ──────────────────────────────────────────
const canvas = document.getElementById('matrix-canvas');
const ctx = canvas.getContext('2d');
let cols, drops;

function initMatrix() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const fontSize = 14;
  cols = Math.floor(canvas.width / fontSize);
  drops = Array(cols).fill(1);
}

function drawMatrix() {
  ctx.fillStyle = 'rgba(10, 10, 15, 0.05)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#7c6fff';
  ctx.font = '14px DM Mono, monospace';
  const chars = '01アイウエオカキクケコサシスセソタチツテトナニヌネノ';
  for (let i = 0; i < drops.length; i++) {
    const char = chars[Math.floor(Math.random() * chars.length)];
    ctx.fillStyle = Math.random() > 0.95 ? '#ff6b9d' : (Math.random() > 0.7 ? '#a093f8' : '#7c6fff');
    ctx.globalAlpha = Math.random() * 0.5 + 0.1;
    ctx.fillText(char, i * 14, drops[i] * 14);
    if (drops[i] * 14 > canvas.height && Math.random() > 0.975) drops[i] = 0;
    drops[i]++;
  }
  ctx.globalAlpha = 1;
}

initMatrix();
setInterval(drawMatrix, 50);
window.addEventListener('resize', initMatrix);

// ── CHAT ─────────────────────────────────────────────────
let messages = [];
let isLoading = false;

function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 120) + 'px'; }
function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }
function sendSuggestion(text) { document.getElementById('userInput').value = text; sendMessage(); }

// Check if user wants to generate an image
function isImageRequest(text) {
  const keywords = ['generate', 'draw', 'create', 'make', 'paint', 'sketch', 'image of', 'picture of', 'photo of', 'show me'];
  const lower = text.toLowerCase();
  return keywords.some(k => lower.includes(k));
}

function addMessage(role, content, isHTML = false) {
  const welcome = document.getElementById('welcome');
  if (welcome) welcome.remove();
  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  if (isHTML) bubble.innerHTML = content;
  else bubble.innerHTML = content;
  div.innerHTML = `<div class="avatar">${role === 'user' ? '👤' : '🤖'}</div>`;
  div.appendChild(bubble);
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function addImageMessage(prompt) {
  const welcome = document.getElementById('welcome');
  if (welcome) welcome.remove();
  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg ai';

  const encodedPrompt = encodeURIComponent(prompt);
  const seed = Math.floor(Math.random() * 99999);
  const imgUrl = `https://image.pollinations.ai/prompt/${encodedPrompt}?seed=${seed}&nologo=true`;

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.style.cssText = 'padding:10px;background:var(--surface2);border:1px solid var(--border);';
  bubble.innerHTML = `
    <div style="font-size:0.85rem;color:var(--text2);margin-bottom:10px;">🎨 Image ready for: <em>"${prompt}"</em></div>
    <a href="${imgUrl}" target="_blank" style="display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent2));color:white;padding:8px 18px;border-radius:20px;font-size:0.85rem;text-decoration:none;font-family:Syne,sans-serif;">
      🖼️ View Generated Image
    </a>
    <div style="font-size:0.72rem;color:var(--text3);margin-top:8px;">Opens in new tab • Takes 5-10 seconds to generate</div>`;

  div.innerHTML = `<div class="avatar">🤖</div>`;
  div.appendChild(bubble);
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function addTyping() {
  const welcome = document.getElementById('welcome');
  if (welcome) welcome.remove();
  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg ai'; div.id = 'typing';
  div.innerHTML = `<div class="avatar">🤖</div><div class="bubble"><span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span></div>`;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function removeTyping() { const t = document.getElementById('typing'); if (t) t.remove(); }

async function sendMessage() {
  if (isLoading) return;
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) return;
  addMessage('user', text.replace(/\n/g, '<br>'));
  input.value = ''; input.style.height = 'auto';
  isLoading = true;
  document.getElementById('sendBtn').disabled = true;

  // Check if image generation request
  if (isImageRequest(text)) {
    const prompt = text
      .replace(/^(can you|can u|please|hey|i want|i need)\s*/i, '')
      .replace(/^(generate|draw|create|make|paint|sketch|show me|image of|picture of|photo of|a photo of|a picture of|a image of)\s*/i, '')
      .trim() || 'beautiful landscape';
    addMessage('user', text.replace(/\n/g, '<br>'));
    addImageMessage(prompt);
    isLoading = false;
    document.getElementById('sendBtn').disabled = false;
    document.getElementById('userInput').focus();
    return;
  }

  messages.push({ role: 'user', content: text });
  addTyping();
  try {
    const response = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages })
    });
    const data = await response.json();
    removeTyping();
    if (data.choices && data.choices[0]) {
      const reply = data.choices[0].message.content;
      messages.push({ role: 'assistant', content: reply });
      addMessage('ai', reply.replace(/\n/g, '<br>'));
    } else if (data.error) {
      addMessage('ai', '❌ Error: ' + data.error.message);
    }
  } catch (e) {
    removeTyping();
    addMessage('ai', '❌ Could not connect. Please try again!');
  }
  isLoading = false;
  document.getElementById('sendBtn').disabled = false;
  document.getElementById('userInput').focus();
}

// ── PWA ──────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(e => console.log('SW error:', e));
}
</script>
</body>
</html>

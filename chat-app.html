<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Private chat only friends</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0f;
    --surface: #17171a;
    --surface2: #1e1e22;
    --surface3: #252529;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
    --accent: #7c6af5;
    --accent2: #a093f8;
    --text: #e8e8ee;
    --muted: #7a7a8a;
    --muted2: #555566;
    --bubble-me: #2d2860;
    --bubble-them: #1e1e25;
    --green: #3ecf6e;
    --font: 'DM Sans', sans-serif;
    --mono: 'Space Mono', monospace;
    --radius: 16px;
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    overflow: hidden;
  }

  /* ── LOGIN SCREEN ── */
  #login-screen {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
  }

  .login-card {
    width: 100%;
    max-width: 400px;
    padding: 2.5rem 2rem;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 24px;
    margin: 1rem;
  }

  .login-logo {
    font-family: var(--mono);
    font-size: 1.5rem;
    font-weight: 700;
    letter-spacing: -1px;
    color: var(--accent2);
    margin-bottom: 0.25rem;
  }

  .login-sub { font-size: 0.85rem; color: var(--muted); margin-bottom: 2rem; }

  .field-label {
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.4rem;
  }

  .field-group { margin-bottom: 1.25rem; }

  .field-group input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.7rem 1rem;
    color: var(--text);
    font-family: var(--font);
    font-size: 0.95rem;
    outline: none;
    transition: border 0.15s;
  }

  .field-group input:focus { border-color: var(--accent); }

  .btn-join {
    width: 100%;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 10px;
    padding: 0.75rem;
    font-family: var(--font);
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    margin-top: 0.5rem;
  }

  .btn-join:hover { background: var(--accent2); }
  .btn-join:active { transform: scale(0.98); }

  .login-hint {
    margin-top: 1.25rem;
    font-size: 0.78rem;
    color: var(--muted);
    text-align: center;
    line-height: 1.6;
  }

  .login-hint span { color: var(--accent2); font-weight: 600; }

  #login-error {
    color: #f87171;
    font-size: 0.82rem;
    margin-top: 0.5rem;
    display: none;
  }

  /* ── MAIN APP ── */
  #app { display: none; width: 100%; }

  /* Sidebar */
  #sidebar {
    width: 240px;
    flex-shrink: 0;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    height: 100dvh;
  }

  .sidebar-header {
    padding: 1rem 1rem 0.75rem;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-logo {
    font-family: var(--mono);
    font-weight: 700;
    font-size: 1rem;
    color: var(--accent2);
    letter-spacing: -0.5px;
  }

  .user-pill {
    display: flex;
    align-items: center;
    gap: 7px;
    margin-top: 0.6rem;
    font-size: 0.8rem;
    color: var(--muted);
  }

  .user-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--green);
    flex-shrink: 0;
  }

  .sidebar-section-title {
    font-size: 0.68rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted2);
    padding: 1rem 1rem 0.4rem;
  }

  .room-list { flex: 1; overflow-y: auto; padding: 0 0.5rem; }

  .room-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0.5rem 0.6rem;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.88rem;
    color: var(--muted);
    transition: background 0.1s, color 0.1s;
    margin-bottom: 2px;
  }

  .room-item:hover { background: var(--surface2); color: var(--text); }
  .room-item.active { background: var(--bubble-me); color: var(--accent2); }

  .room-hash { font-family: var(--mono); font-size: 0.9rem; color: var(--muted2); }
  .room-item.active .room-hash { color: var(--accent); }

  .add-room-btn {
    margin: 0.5rem;
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 0.5rem 0.75rem;
    border-radius: 8px;
    background: none;
    border: 1px dashed var(--border2);
    color: var(--muted);
    font-family: var(--font);
    font-size: 0.82rem;
    cursor: pointer;
    transition: background 0.1s, color 0.1s;
    width: calc(100% - 1rem);
  }
  .add-room-btn:hover { background: var(--surface2); color: var(--text); }

  .sidebar-footer {
    padding: 0.75rem 1rem;
    border-top: 1px solid var(--border);
  }

  .leave-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-family: var(--font);
    font-size: 0.8rem;
    padding: 0.4rem 0.75rem;
    cursor: pointer;
    transition: border 0.15s, color 0.15s;
    width: 100%;
  }
  .leave-btn:hover { border-color: #f87171; color: #f87171; }

  /* Chat area */
  #chat-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    height: 100dvh;
    overflow: hidden;
  }

  .chat-topbar {
    padding: 0.85rem 1.25rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface);
    flex-shrink: 0;
  }

  .topbar-room { font-family: var(--mono); font-size: 0.95rem; color: var(--accent2); }
  .topbar-sep { color: var(--muted2); }
  .topbar-desc { font-size: 0.82rem; color: var(--muted); }

  .online-count {
    margin-left: auto;
    font-size: 0.75rem;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 5px;
  }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 1rem 1.25rem;
    display: flex;
    flex-direction: column;
    gap: 2px;
    scroll-behavior: smooth;
  }

  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 2px; }

  .msg-group { margin-bottom: 0.75rem; }

  .msg-header {
    display: flex;
    align-items: baseline;
    gap: 8px;
    margin-bottom: 3px;
    padding-left: 0.25rem;
  }

  .msg-name { font-size: 0.8rem; font-weight: 600; color: var(--accent2); }
  .msg-name.me { color: #a093f8; }
  .msg-time { font-size: 0.7rem; color: var(--muted2); }

  .msg-bubble {
    display: inline-block;
    max-width: 85%;
    padding: 0.5rem 0.85rem;
    border-radius: 14px;
    border-bottom-left-radius: 4px;
    font-size: 0.9rem;
    line-height: 1.5;
    word-break: break-word;
    background: var(--bubble-them);
    color: var(--text);
    position: relative;
  }

  .msg-group.mine .msg-bubble {
    background: var(--bubble-me);
    border-bottom-left-radius: 14px;
    border-bottom-right-radius: 4px;
  }

  .msg-group.mine { align-items: flex-end; }
  .msg-group.mine .msg-header { flex-direction: row-reverse; }
  .msg-group.mine .msg-name { color: #c4bcfc; }
  .msg-group.mine > .bubble-wrap { display: flex; justify-content: flex-end; }

  .bubble-wrap { position: relative; display: flex; align-items: flex-end; gap: 6px; }
  .msg-group.mine .bubble-wrap { flex-direction: row-reverse; }

  /* Reaction pill on bubble */
  .reaction-row {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-top: 4px;
  }

  .reaction-pill {
    display: flex;
    align-items: center;
    gap: 3px;
    background: var(--surface3);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2px 8px;
    font-size: 0.78rem;
    cursor: pointer;
    transition: background 0.1s, border 0.1s;
    user-select: none;
  }

  .reaction-pill:hover { background: var(--surface2); border-color: var(--accent); }
  .reaction-pill.mine { background: var(--bubble-me); border-color: var(--accent); }
  .reaction-pill .r-count { color: var(--muted); font-size: 0.72rem; }

  /* Emoji picker */
  .emoji-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 3px 6px;
    font-size: 0.75rem;
    cursor: pointer;
    color: var(--muted);
    opacity: 0;
    transition: opacity 0.1s, background 0.1s;
  }

  .bubble-wrap:hover .emoji-btn { opacity: 1; }
  .emoji-btn:hover { background: var(--surface2); }

  .emoji-picker {
    position: absolute;
    bottom: 110%;
    left: 0;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 12px;
    padding: 6px 8px;
    display: none;
    gap: 4px;
    z-index: 100;
    white-space: nowrap;
  }

  .msg-group.mine .emoji-picker { left: auto; right: 0; }
  .emoji-picker.show { display: flex; }

  .emoji-opt {
    font-size: 1.1rem;
    cursor: pointer;
    padding: 3px 4px;
    border-radius: 6px;
    transition: background 0.1s;
    line-height: 1;
  }
  .emoji-opt:hover { background: var(--surface3); }

  /* System message */
  .sys-msg {
    text-align: center;
    font-size: 0.75rem;
    color: var(--muted2);
    padding: 0.25rem 0;
    margin: 0.5rem 0;
  }

  /* Input bar */
  .input-bar {
    padding: 0.75rem 1.25rem;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: flex-end;
    gap: 10px;
    background: var(--surface);
    flex-shrink: 0;
  }

  .input-wrap {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    display: flex;
    align-items: flex-end;
    padding: 0.6rem 0.85rem;
    transition: border 0.15s;
    gap: 8px;
  }

  .input-wrap:focus-within { border-color: var(--accent); }

  #msg-input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: var(--font);
    font-size: 0.92rem;
    resize: none;
    max-height: 120px;
    min-height: 22px;
    line-height: 1.5;
  }

  #msg-input::placeholder { color: var(--muted2); }

  .send-btn {
    background: var(--accent);
    border: none;
    border-radius: 8px;
    padding: 0.4rem 0.75rem;
    color: white;
    font-family: var(--font);
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    flex-shrink: 0;
    transition: background 0.15s;
  }
  .send-btn:hover { background: var(--accent2); }

  /* Add room modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.show { display: flex; }

  .modal-box {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 20px;
    padding: 1.75rem 1.5rem;
    width: 320px;
  }

  .modal-title { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; }

  .modal-box input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.6rem 0.9rem;
    color: var(--text);
    font-family: var(--font);
    font-size: 0.9rem;
    outline: none;
    margin-bottom: 0.75rem;
    transition: border 0.15s;
  }
  .modal-box input:focus { border-color: var(--accent); }

  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 0.5rem; }

  .btn-cancel {
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.5rem 1rem;
    color: var(--muted);
    font-family: var(--font);
    font-size: 0.85rem;
    cursor: pointer;
  }

  .btn-create {
    background: var(--accent);
    border: none;
    border-radius: 8px;
    padding: 0.5rem 1rem;
    color: white;
    font-family: var(--font);
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
  }

  /* Mobile */
  @media (max-width: 600px) {
    #sidebar { display: none; }
    #sidebar.mob-show { display: flex; position: fixed; z-index: 50; height: 100dvh; }
  }
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">// FriendChat</div>
    <div class="login-sub">Private rooms, just your crew.</div>
    <div class="field-group">
      <div class="field-label">Your nickname</div>
      <input type="text" id="nick-input" placeholder="ដាក់ឈ្មោះហែងមក" maxlength="20" autocomplete="off" />
    </div>
    <div class="field-group">
      <div class="field-label">Room password</div>
      <input type="password" id="pass-input" placeholder="Secret code" autocomplete="off" />
    </div>
    <div id="login-error">Wrong password. Try again.</div>
    <button class="btn-join" onclick="joinChat()">Enter Chat →</button>
    <div class="login-hint">
      Share the password <span>only with friends</span>.<br>
      Anyone without it can't get in.
    </div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <!-- Sidebar -->
  <div id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">// FriendChat</div>
      <div class="user-pill">
        <div class="user-dot"></div>
        <span id="sidebar-nick">you</span>
      </div>
    </div>
    <div class="sidebar-section-title">Rooms</div>
    <div class="room-list" id="room-list"></div>
    <button class="add-room-btn" onclick="showAddRoom()">+ new room</button>
    <div class="sidebar-footer">
      <button class="leave-btn" onclick="leaveChat()">Leave chat</button>
    </div>
  </div>

  <!-- Chat Area -->
  <div id="chat-area">
    <div class="chat-topbar">
      <span class="topbar-room" id="topbar-room">#general</span>
      <span class="topbar-sep">·</span>
      <span class="topbar-desc">Friends only</span>
      <div class="online-count">
        <div class="user-dot"></div>
        <span id="online-count">0 online</span>
      </div>
    </div>
    <div id="messages"></div>
    <div class="input-bar">
      <div class="input-wrap">
        <textarea id="msg-input" rows="1" placeholder="Message..."></textarea>
      </div>
      <button class="send-btn" onclick="sendMsg()">Send</button>
    </div>
  </div>
</div>

<!-- Add Room Modal -->
<div class="modal-overlay" id="add-room-modal">
  <div class="modal-box">
    <div class="modal-title">Create a new room</div>
    <input type="text" id="new-room-input" placeholder="Room name (e.g. gaming)" maxlength="20" />
    <div class="modal-actions">
      <button class="btn-cancel" onclick="hideAddRoom()">Cancel</button>
      <button class="btn-create" onclick="createRoom()">Create</button>
    </div>
  </div>
</div>

<script>
// ── CONFIG ──────────────────────────────────────────────
// Change ROOM_PASSWORD to your secret code!
const ROOM_PASSWORD = 'kompongluong';

// ── STATE ───────────────────────────────────────────────
let myNick = '';
let currentRoom = 'general';
let rooms = ['general', 'random'];
let messages = {}; // roomName -> [{id, nick, text, time, reactions:{emoji: Set<nick>}}]
let onlineUsers = new Set();
let openEmojiMsgId = null;

const EMOJIS = ['👍','❤️','😂','😮','😢','🔥'];

// ── AUTH ─────────────────────────────────────────────────
function joinChat() {
  const nick = document.getElementById('nick-input').value.trim();
  const pass = document.getElementById('pass-input').value;
  const err = document.getElementById('login-error');

  if (!nick) { err.textContent = 'Please enter a nickname.'; err.style.display = 'block'; return; }
  if (pass !== ROOM_PASSWORD) { err.style.display = 'block'; err.textContent = 'Wrong password. Try again.'; return; }

  myNick = nick;
  err.style.display = 'none';
  onlineUsers.add(nick);

  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('sidebar-nick').textContent = myNick;

  renderRoomList();
  switchRoom('general');
  addSystemMsg('general', `${myNick} joined the chat`);
  updateOnlineCount();
}

function leaveChat() {
  addSystemMsg(currentRoom, `${myNick} left the chat`);
  onlineUsers.delete(myNick);
  myNick = '';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.getElementById('nick-input').value = '';
  document.getElementById('pass-input').value = '';
  updateOnlineCount();
}

// ── ROOMS ────────────────────────────────────────────────
function renderRoomList() {
  const list = document.getElementById('room-list');
  list.innerHTML = '';
  rooms.forEach(r => {
    const el = document.createElement('div');
    el.className = 'room-item' + (r === currentRoom ? ' active' : '');
    el.innerHTML = `<span class="room-hash">#</span> ${r}`;
    el.onclick = () => switchRoom(r);
    list.appendChild(el);
  });
}

function switchRoom(room) {
  currentRoom = room;
  document.getElementById('topbar-room').textContent = '#' + room;
  renderRoomList();
  renderMessages();
  scrollBottom();
}

function showAddRoom() { document.getElementById('add-room-modal').classList.add('show'); }
function hideAddRoom() { document.getElementById('add-room-modal').classList.remove('show'); }

function createRoom() {
  const name = document.getElementById('new-room-input').value.trim().toLowerCase().replace(/\s+/g, '-');
  if (!name) return;
  if (!rooms.includes(name)) {
    rooms.push(name);
    messages[name] = [];
  }
  hideAddRoom();
  document.getElementById('new-room-input').value = '';
  switchRoom(name);
  addSystemMsg(name, `${myNick} created this room`);
}

// ── MESSAGES ─────────────────────────────────────────────
function sendMsg() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text || !myNick) return;

  if (!messages[currentRoom]) messages[currentRoom] = [];

  const msg = {
    id: Date.now() + Math.random(),
    nick: myNick,
    text: escapeHtml(text),
    time: new Date(),
    reactions: {},
    type: 'msg'
  };

  messages[currentRoom].push(msg);
  input.value = '';
  input.style.height = 'auto';
  renderMessages();
  scrollBottom();
}

function addSystemMsg(room, text) {
  if (!messages[room]) messages[room] = [];
  messages[room].push({ id: Date.now() + Math.random(), type: 'system', text });
  if (room === currentRoom) { renderMessages(); scrollBottom(); }
}

function formatTime(date) {
  return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function escapeHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderMessages() {
  const container = document.getElementById('messages');
  const msgs = messages[currentRoom] || [];
  container.innerHTML = '';

  msgs.forEach(m => {
    if (m.type === 'system') {
      const el = document.createElement('div');
      el.className = 'sys-msg';
      el.textContent = m.text;
      container.appendChild(el);
      return;
    }

    const isMine = m.nick === myNick;
    const group = document.createElement('div');
    group.className = 'msg-group' + (isMine ? ' mine' : '');

    // Header
    const header = document.createElement('div');
    header.className = 'msg-header';
    header.innerHTML = `<span class="msg-name${isMine ? ' me' : ''}">${escapeHtml(m.nick)}</span>
                        <span class="msg-time">${formatTime(m.time)}</span>`;
    group.appendChild(header);

    // Bubble wrap
    const bwrap = document.createElement('div');
    bwrap.className = 'bubble-wrap';

    // Emoji button
    const emojiBtn = document.createElement('button');
    emojiBtn.className = 'emoji-btn';
    emojiBtn.textContent = '+';
    emojiBtn.title = 'React';
    emojiBtn.onclick = (e) => { e.stopPropagation(); togglePicker(m.id); };

    // Picker
    const picker = document.createElement('div');
    picker.className = 'emoji-picker' + (openEmojiMsgId === m.id ? ' show' : '');
    picker.id = 'picker-' + m.id;
    EMOJIS.forEach(emoji => {
      const opt = document.createElement('div');
      opt.className = 'emoji-opt';
      opt.textContent = emoji;
      opt.onclick = (e) => { e.stopPropagation(); addReaction(m.id, emoji); };
      picker.appendChild(opt);
    });

    // Bubble + reactions
    const bubbleCol = document.createElement('div');
    bubbleCol.style.cssText = 'display:flex;flex-direction:column;align-items:' + (isMine ? 'flex-end' : 'flex-start');

    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    bubble.innerHTML = m.text.replace(/\n/g, '<br>');
    bubble.style.position = 'relative';
    bubble.appendChild(picker);
    bubbleCol.appendChild(bubble);

    // Reactions
    if (Object.keys(m.reactions).length > 0) {
      const rrow = document.createElement('div');
      rrow.className = 'reaction-row';
      Object.entries(m.reactions).forEach(([emoji, nicks]) => {
        if (nicks.size === 0) return;
        const pill = document.createElement('div');
        const iReacted = nicks.has(myNick);
        pill.className = 'reaction-pill' + (iReacted ? ' mine' : '');
        pill.innerHTML = `${emoji} <span class="r-count">${nicks.size}</span>`;
        pill.title = [...nicks].join(', ');
        pill.onclick = () => addReaction(m.id, emoji);
        rrow.appendChild(pill);
      });
      bubbleCol.appendChild(rrow);
    }

    if (isMine) {
      bwrap.appendChild(emojiBtn);
      bwrap.appendChild(bubbleCol);
    } else {
      bwrap.appendChild(bubbleCol);
      bwrap.appendChild(emojiBtn);
    }

    group.appendChild(bwrap);
    container.appendChild(group);
  });
}

// ── REACTIONS ────────────────────────────────────────────
function addReaction(msgId, emoji) {
  const msgs = messages[currentRoom] || [];
  const m = msgs.find(x => x.id === msgId);
  if (!m) return;
  if (!m.reactions[emoji]) m.reactions[emoji] = new Set();
  if (m.reactions[emoji].has(myNick)) {
    m.reactions[emoji].delete(myNick);
  } else {
    m.reactions[emoji].add(myNick);
  }
  openEmojiMsgId = null;
  renderMessages();
}

function togglePicker(msgId) {
  openEmojiMsgId = (openEmojiMsgId === msgId) ? null : msgId;
  renderMessages();
}

// Close picker on outside click
document.addEventListener('click', () => {
  if (openEmojiMsgId !== null) { openEmojiMsgId = null; renderMessages(); }
});

// ── UI HELPERS ───────────────────────────────────────────
function scrollBottom() {
  const c = document.getElementById('messages');
  requestAnimationFrame(() => { c.scrollTop = c.scrollHeight; });
}

function updateOnlineCount() {
  document.getElementById('online-count').textContent = onlineUsers.size + ' online';
}

// Auto-resize textarea
document.getElementById('msg-input').addEventListener('input', function () {
  this.style.height = 'auto';
  this.style.height = this.scrollHeight + 'px';
});

// Send on Enter (Shift+Enter for newline)
document.getElementById('msg-input').addEventListener('keydown', function (e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
});

// Login on Enter
document.getElementById('pass-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') joinChat();
});
document.getElementById('nick-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('pass-input').focus();
});
</script>

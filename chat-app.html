<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FriendChat VIP</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap');
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0d0d0f; --surface: #17171a; --surface2: #1e1e22; --surface3: #252529;
  --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.13);
  --accent: #7c6af5; --accent2: #a093f8; --text: #e8e8ee;
  --muted: #7a7a8a; --muted2: #555566;
  --bubble-me: #2d2860; --bubble-them: #1e1e25;
  --green: #3ecf6e; --font: 'DM Sans', sans-serif; --mono: 'Space Mono', monospace;
}
html, body { width: 100%; height: 100%; }
body { font-family: var(--font); background: var(--bg); color: var(--text); height: 100dvh; width: 100vw; display: flex; overflow: hidden; position: fixed; top: 0; left: 0; right: 0; bottom: 0; }

/* LOGIN */
#login-screen { width: 100%; display: flex; align-items: center; justify-content: center; }
.login-card { width: 100%; max-width: 400px; padding: 2.5rem 2rem; background: var(--surface); border: 1px solid var(--border2); border-radius: 24px; margin: 1rem; }
.login-logo { font-family: var(--mono); font-size: 1.5rem; font-weight: 700; letter-spacing: -1px; color: var(--accent2); margin-bottom: 0.25rem; }
.login-sub { font-size: 0.85rem; color: var(--muted); margin-bottom: 1.5rem; }
.tabs { display: flex; border-radius: 10px; overflow: hidden; border: 1px solid var(--border2); margin-bottom: 1.5rem; }
.tab-btn { flex: 1; padding: 0.6rem; border: none; font-family: var(--font); font-size: 0.88rem; font-weight: 600; cursor: pointer; transition: background 0.2s, color 0.2s; }
.tab-btn.active { background: var(--accent); color: white; }
.tab-btn.inactive { background: var(--surface2); color: var(--muted); }
.field-label { font-size: 0.75rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.4rem; }
.field-group { margin-bottom: 1.1rem; }
.field-group input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 0.7rem 1rem; color: var(--text); font-family: var(--font); font-size: 0.95rem; outline: none; transition: border 0.15s; }
.field-group input:focus { border-color: var(--accent); }
.btn-join { width: 100%; background: var(--accent); color: white; border: none; border-radius: 10px; padding: 0.75rem; font-family: var(--font); font-size: 0.95rem; font-weight: 600; cursor: pointer; margin-top: 0.5rem; transition: background 0.15s; }
.btn-join:hover { background: var(--accent2); }
.login-msg { font-size: 0.82rem; margin-top: 0.6rem; text-align: center; display: none; }
.login-msg.err { color: #f87171; }
.login-msg.ok { color: var(--green); }
.login-hint { margin-top: 1rem; font-size: 0.78rem; color: var(--muted); text-align: center; line-height: 1.6; }
.login-hint span { color: var(--accent2); font-weight: 600; }

/* APP */
#app { display: none; width: 100%; height: 100dvh; overflow: hidden; }
#sidebar { width: 240px; flex-shrink: 0; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; height: 100dvh; }
.sidebar-header { padding: 1rem 1rem 0.75rem; border-bottom: 1px solid var(--border); }
.sidebar-logo { font-family: var(--mono); font-weight: 700; font-size: 1rem; color: var(--accent2); }
.user-pill { display: flex; align-items: center; gap: 7px; margin-top: 0.6rem; font-size: 0.8rem; color: var(--muted); }
.user-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
.sidebar-section-title { font-size: 0.68rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted2); padding: 1rem 1rem 0.4rem; }
.room-list { flex: 1; overflow-y: auto; padding: 0 0.5rem; }
.room-item { display: flex; align-items: center; gap: 8px; padding: 0.5rem 0.6rem; border-radius: 8px; cursor: pointer; font-size: 0.88rem; color: var(--muted); transition: background 0.1s, color 0.1s; margin-bottom: 2px; }
.room-item:hover { background: var(--surface2); color: var(--text); }
.room-item.active { background: var(--bubble-me); color: var(--accent2); }
.room-hash { font-family: var(--mono); font-size: 0.9rem; color: var(--muted2); }
.room-item.active .room-hash { color: var(--accent); }
.add-room-btn { margin: 0.5rem; display: flex; align-items: center; gap: 6px; padding: 0.5rem 0.75rem; border-radius: 8px; background: none; border: 1px dashed var(--border2); color: var(--muted); font-family: var(--font); font-size: 0.82rem; cursor: pointer; width: calc(100% - 1rem); transition: background 0.1s; }
.add-room-btn:hover { background: var(--surface2); color: var(--text); }
.sidebar-footer { padding: 0.75rem 1rem; border-top: 1px solid var(--border); }
.leave-btn { background: none; border: 1px solid var(--border); border-radius: 8px; color: var(--muted); font-family: var(--font); font-size: 0.8rem; padding: 0.4rem 0.75rem; cursor: pointer; width: 100%; transition: border 0.15s, color 0.15s; }
.leave-btn:hover { border-color: #f87171; color: #f87171; }

#chat-area { flex: 1; display: flex; flex-direction: column; height: 100dvh; overflow: hidden; }
.chat-topbar { padding: 0.85rem 1.25rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; background: var(--surface); flex-shrink: 0; }
.topbar-room { font-family: var(--mono); font-size: 0.95rem; color: var(--accent2); }
.topbar-sep { color: var(--muted2); }
.topbar-desc { font-size: 0.82rem; color: var(--muted); }
.online-count { margin-left: auto; font-size: 0.75rem; color: var(--muted); display: flex; align-items: center; gap: 5px; }

#messages { flex: 1; overflow-y: auto; padding: 1rem 1.25rem; display: flex; flex-direction: column; gap: 2px; scroll-behavior: smooth; }
#messages::-webkit-scrollbar { width: 4px; }
#messages::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 2px; }

.msg-group { margin-bottom: 0.75rem; }
.msg-header { display: flex; align-items: baseline; gap: 8px; margin-bottom: 3px; padding-left: 0.25rem; }
.msg-name { font-size: 0.8rem; font-weight: 600; color: var(--accent2); }
.msg-name.me { color: #a093f8; }
.msg-time { font-size: 0.7rem; color: var(--muted2); }
.msg-group.mine .msg-header { flex-direction: row-reverse; }
.msg-group.mine .msg-name { color: #c4bcfc; }
.msg-group.mine > .bubble-wrap { justify-content: flex-end; }

.bubble-wrap { display: flex; align-items: flex-end; gap: 6px; max-width: 88%; }
.msg-group.mine .bubble-wrap { flex-direction: row-reverse; margin-left: auto; }

.msg-bubble { display: inline-block; min-width: 60px; max-width: 100%; padding: 0.5rem 0.85rem; border-radius: 14px; border-bottom-left-radius: 4px; font-size: 0.9rem; line-height: 1.6; white-space: normal; word-break: break-word; overflow-wrap: break-word; background: var(--bubble-them); color: var(--text); position: relative; }
.msg-group.mine .msg-bubble { background: var(--bubble-me); border-bottom-left-radius: 14px; border-bottom-right-radius: 4px; }

.msg-bubble.photo-bubble { padding: 4px; background: transparent; }
.msg-bubble.photo-bubble img { display: block; max-width: 200px; max-height: 200px; border-radius: 10px; cursor: pointer; }
.msg-bubble.link-bubble { background: var(--surface3); border: 1px solid var(--border2); }
.msg-group.mine .msg-bubble.link-bubble { background: #3a3270; }
.link-bubble a { color: var(--accent2); text-decoration: underline; word-break: break-all; font-size: 0.88rem; }
.link-icon { font-size: 0.75rem; color: var(--muted); margin-bottom: 2px; }

.seen-row { font-size: 0.68rem; color: var(--muted2); margin-top: 3px; display: flex; align-items: center; gap: 3px; }
.msg-group.mine .seen-row { justify-content: flex-end; }
.seen-tick { color: var(--green); }

.reaction-row { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
.reaction-pill { display: flex; align-items: center; gap: 3px; background: var(--surface3); border: 1px solid var(--border); border-radius: 20px; padding: 2px 8px; font-size: 0.78rem; cursor: pointer; user-select: none; transition: background 0.1s; }
.reaction-pill:hover { background: var(--surface2); border-color: var(--accent); }
.reaction-pill.mine { background: var(--bubble-me); border-color: var(--accent); }
.reaction-pill .r-count { color: var(--muted); font-size: 0.72rem; }

.emoji-btn { background: none; border: 1px solid var(--border); border-radius: 8px; padding: 3px 6px; font-size: 0.75rem; cursor: pointer; color: var(--muted); opacity: 0; transition: opacity 0.1s; flex-shrink: 0; }
.bubble-wrap:hover .emoji-btn { opacity: 1; }
.delete-btn { background: none; border: none; font-size: 0.75rem; cursor: pointer; color: var(--muted2); opacity: 0; transition: opacity 0.1s; padding: 3px 5px; flex-shrink: 0; }
.bubble-wrap:hover .delete-btn { opacity: 1; }
.delete-btn:hover { color: #f87171; }

.emoji-picker { position: absolute; bottom: 110%; left: 0; background: var(--surface2); border: 1px solid var(--border2); border-radius: 12px; padding: 6px 8px; display: none; gap: 4px; z-index: 100; white-space: nowrap; }
.msg-group.mine .emoji-picker { left: auto; right: 0; }
.emoji-picker.show { display: flex; }
.emoji-opt { font-size: 1.1rem; cursor: pointer; padding: 3px 4px; border-radius: 6px; transition: background 0.1s; }
.emoji-opt:hover { background: var(--surface3); }

.sys-msg { text-align: center; font-size: 0.75rem; color: var(--muted2); padding: 0.25rem 0; margin: 0.5rem 0; }

.input-bar { padding: 0.6rem 1rem; border-top: 1px solid var(--border); display: flex; align-items: flex-end; gap: 8px; background: var(--surface); flex-shrink: 0; }
.input-actions { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }
.action-btn { background: none; border: 1px solid var(--border); border-radius: 8px; padding: 0 10px; height: 36px; color: var(--muted); font-size: 1rem; cursor: pointer; display: flex; align-items: center; }
.action-btn:hover { background: var(--surface2); color: var(--text); }
.input-wrap { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; display: flex; align-items: flex-end; padding: 0.5rem 0.85rem; transition: border 0.15s; }
.input-wrap:focus-within { border-color: var(--accent); }
#msg-input { flex: 1; background: none; border: none; outline: none; color: var(--text); font-family: var(--font); font-size: 0.92rem; resize: none; max-height: 120px; min-height: 22px; line-height: 1.5; }
#msg-input::placeholder { color: var(--muted2); }
.send-btn { background: var(--accent); border: none; border-radius: 8px; padding: 0 14px; height: 36px; color: white; font-family: var(--font); font-size: 0.85rem; font-weight: 600; cursor: pointer; flex-shrink: 0; transition: background 0.15s; }
.send-btn:hover { background: var(--accent2); }

.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 200; align-items: center; justify-content: center; }
.modal-overlay.show { display: flex; }
.modal-box { background: var(--surface); border: 1px solid var(--border2); border-radius: 20px; padding: 1.75rem 1.5rem; width: 320px; }
.modal-title { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; }
.modal-box input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 0.6rem 0.9rem; color: var(--text); font-family: var(--font); font-size: 0.9rem; outline: none; margin-bottom: 0.75rem; transition: border 0.15s; }
.modal-box input:focus { border-color: var(--accent); }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 0.5rem; }
.btn-cancel { background: none; border: 1px solid var(--border); border-radius: 8px; padding: 0.5rem 1rem; color: var(--muted); font-family: var(--font); font-size: 0.85rem; cursor: pointer; }
.btn-create { background: var(--accent); border: none; border-radius: 8px; padding: 0.5rem 1rem; color: white; font-family: var(--font); font-size: 0.85rem; font-weight: 600; cursor: pointer; }

#lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 300; align-items: center; justify-content: center; cursor: zoom-out; }
#lightbox.show { display: flex; }
#lightbox img { max-width: 90vw; max-height: 90vh; border-radius: 10px; }

@media (max-width: 768px) {
  #sidebar { display: none !important; }
  #app, #chat-area { width: 100vw !important; }
  .bubble-wrap { max-width: 90%; }
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">// FriendChat-VIP ONLY</div>
    <div class="login-sub">Create By chhaiyaDeveloper</div>
    <div class="tabs">
      <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">ចូល</button>
      <button class="tab-btn inactive" id="tab-signup" onclick="switchTab('signup')">ចុះឈ្មោះ</button>
    </div>
    <div class="field-group">
      <div class="field-label">ឈ្មោះ</div>
      <input type="text" id="nick-input" placeholder="ដាកឈ្មោះហែងមក" maxlength="20" autocomplete="off" />
    </div>
    <div class="field-group">
      <div class="field-label">លេខកូដ</div>
      <input type="password" id="pass-input" placeholder="ដាក់លេខកូដចូលមក" autocomplete="off" />
    </div>
    <div class="field-group" id="confirm-group" style="display:none;">
      <div class="field-label">បញ្ជាក់លេខកូដ</div>
      <input type="password" id="confirm-input" placeholder="ដាក់លេខកូដម្តងទៀត" autocomplete="off" />
    </div>
    <div class="login-msg err" id="login-error"></div>
    <div class="login-msg ok" id="login-success"></div>
    <button class="btn-join" id="join-btn" onclick="joinChat()">ចូលមក →</button>
    <div class="login-hint" id="login-hint">អត់មានគណនីទេ? ចុច <span>ចុះឈ្មោះ</span> ខាងលើ.</div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">// FriendChat-VIP</div>
      <div class="user-pill"><div class="user-dot"></div><span id="sidebar-nick">you</span></div>
    </div>
    <div class="sidebar-section-title">Rooms</div>
    <div class="room-list" id="room-list"></div>
    <button class="add-room-btn" id="add-room-btn">+ new room</button>
    <div class="sidebar-footer"><button class="leave-btn" id="leave-btn">ហែងចេញរកងាប់ស្អី</button></div>
  </div>
  <div id="chat-area">
    <div class="chat-topbar">
      <span class="topbar-room" id="topbar-room">#general</span>
      <span class="topbar-sep">·</span>
      <span class="topbar-desc">Friends only</span>
      <div class="online-count"><div class="user-dot"></div><span id="online-count">0 online</span></div>
    </div>
    <div id="messages"></div>
    <div class="input-bar">
      <div class="input-actions">
        <button class="action-btn" id="photo-btn">📷</button>
        <input type="file" id="photo-input" accept="image/*" style="display:none" />
        <button class="action-btn" id="link-btn">🔗</button>
      </div>
      <div class="input-wrap">
        <textarea id="msg-input" rows="1" placeholder="និយាយមក...."></textarea>
      </div>
      <button class="send-btn" id="send-btn">ផ្ញើ</button>
    </div>
  </div>
</div>

<!-- Modals -->
<div class="modal-overlay" id="add-room-modal">
  <div class="modal-box">
    <div class="modal-title">Create a new room</div>
    <input type="text" id="new-room-input" placeholder="Room name" maxlength="20" />
    <div class="modal-actions">
      <button class="btn-cancel" id="cancel-room-btn">Cancel</button>
      <button class="btn-create" id="create-room-btn">Create</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="link-modal">
  <div class="modal-box">
    <div class="modal-title">Send a link</div>
    <input type="url" id="link-input" placeholder="https://..." />
    <div class="modal-actions">
      <button class="btn-cancel" id="cancel-link-btn">Cancel</button>
      <button class="btn-create" id="send-link-btn">Send</button>
    </div>
  </div>
</div>

<div id="lightbox" onclick="closeLightbox()">
  <img id="lightbox-img" src="" alt="" />
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
// ── CONFIG ───────────────────────────────────────────────
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyDEGzcoCjv3sOBihbDDbJH2_bUOFrixwY0",
  authDomain:        "chatwithfriend-f4de5.firebaseapp.com",
  databaseURL:       "https://chatwithfriend-f4de5-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:         "chatwithfriend-f4de5",
  storageBucket:     "chatwithfriend-f4de5.firebasestorage.app",
  messagingSenderId: "24969437141",
  appId:             "1:24969437141:web:e376b78cbcb7e3d0a6675c"
};

// ── FIREBASE INIT ────────────────────────────────────────
let db = null;
try {
  firebase.initializeApp(FIREBASE_CONFIG);
  db = firebase.database();
} catch(e) { console.error('Firebase init failed:', e); }

// ── STATE ────────────────────────────────────────────────
let myNick = '', currentRoom = 'general', authMode = 'login';
let rooms = ['general', 'random'];
let localMessages = {}, unsubscribers = {}, openEmojiMsgId = null;
const EMOJIS = ['👍','❤️','😂','😮','😢','🔥'];

// ── AUTH UI ──────────────────────────────────────────────
function switchTab(mode) {
  authMode = mode;
  const s = mode === 'signup';
  document.getElementById('tab-login').className = 'tab-btn ' + (s ? 'inactive' : 'active');
  document.getElementById('tab-signup').className = 'tab-btn ' + (s ? 'active' : 'inactive');
  document.getElementById('confirm-group').style.display = s ? 'block' : 'none';
  document.getElementById('join-btn').textContent = s ? 'ចុះឈ្មោះ →' : 'ចូលមក →';
  document.getElementById('login-hint').innerHTML = s
    ? 'មានគណនីហើយ? ចុច <span style="color:var(--accent2);font-weight:600;">ចូល</span> ខាងលើ.'
    : 'អត់មានគណនីទេ? ចុច <span style="color:var(--accent2);font-weight:600;">ចុះឈ្មោះ</span> ខាងលើ.';
  showMsg('', '');
}

function showMsg(err, ok) {
  const e = document.getElementById('login-error');
  const s = document.getElementById('login-success');
  e.textContent = err; e.style.display = err ? 'block' : 'none';
  s.textContent = ok; s.style.display = ok ? 'block' : 'none';
}

// ── AUTH ─────────────────────────────────────────────────
function joinChat() {
  const nick = document.getElementById('nick-input').value.trim();
  const pass = document.getElementById('pass-input').value;
  if (!nick) { showMsg('Please enter your username.', ''); return; }
  if (!pass) { showMsg('Please enter your password.', ''); return; }
  if (!db) { showMsg('Database not connected!', ''); return; }

  if (authMode === 'signup') {
    const confirm = document.getElementById('confirm-input').value;
    if (pass !== confirm) { showMsg('Passwords do not match!', ''); return; }
    if (pass.length < 4) { showMsg('Password needs at least 4 characters.', ''); return; }
    db.ref('users/' + nick).once('value').then(snap => {
      if (snap.exists()) { showMsg('Username already taken!', ''); return; }
      db.ref('users/' + nick).set({ password: pass }).then(() => {
        showMsg('', 'Account created! Entering chat...');
        setTimeout(() => enterApp(nick), 800);
      });
    }).catch(err => showMsg('Error: ' + err.message, ''));
  } else {
    db.ref('users/' + nick).once('value').then(snap => {
      if (!snap.exists()) { showMsg('Username not found. Sign up first!', ''); return; }
      if (snap.val().password !== pass) { showMsg('Wrong password!', ''); return; }
      enterApp(nick);
    }).catch(err => showMsg('Error: ' + err.message, ''));
  }
}

function enterApp(nick) {
  myNick = nick;
  showMsg('', '');
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('sidebar-nick').textContent = myNick;

  const presenceRef = db.ref('presence/' + myNick);
  presenceRef.set({ nick: myNick, online: true });
  presenceRef.onDisconnect().remove();

  db.ref('presence').on('value', snap => {
    document.getElementById('online-count').textContent = (snap.exists() ? Object.keys(snap.val()).length : 0) + ' online';
  });

  db.ref('rooms').on('value', snap => {
    if (snap.exists()) {
      Object.keys(snap.val()).forEach(r => { if (!rooms.includes(r)) rooms.push(r); });
      renderRoomList();
    }
  });

  db.ref('rooms/general').set(true);
  db.ref('rooms/random').set(true);
  renderRoomList();
  switchRoom('general');
  postSystemMsg('general', myNick + ' joined the chat');
}

function leaveChat() {
  postSystemMsg(currentRoom, myNick + ' left the chat');
  db.ref('presence/' + myNick).remove();
  Object.values(unsubscribers).forEach(fn => fn && fn());
  unsubscribers = {}; myNick = '';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.getElementById('nick-input').value = '';
  document.getElementById('pass-input').value = '';
  switchTab('login');
}

// ── ROOMS ────────────────────────────────────────────────
function renderRoomList() {
  const list = document.getElementById('room-list');
  list.innerHTML = '';
  rooms.forEach(r => {
    const el = document.createElement('div');
    el.className = 'room-item' + (r === currentRoom ? ' active' : '');
    el.innerHTML = '<span class="room-hash">#</span> ' + r;
    el.onclick = () => switchRoom(r);
    list.appendChild(el);
  });
}

function switchRoom(room) {
  if (unsubscribers[currentRoom]) { unsubscribers[currentRoom](); unsubscribers[currentRoom] = null; }
  currentRoom = room;
  document.getElementById('topbar-room').textContent = '#' + room;
  document.getElementById('messages').innerHTML = '';
  renderRoomList();

  const msgsRef = db.ref('messages/' + room);
  const handler = msgsRef.on('value', snap => {
    document.getElementById('messages').innerHTML = '';
    if (!snap.exists()) return;
    const entries = Object.entries(snap.val()).sort(([,a],[,b]) => (a.time||0) - (b.time||0));
    entries.forEach(([id, m]) => renderMessage(id, m));
    entries.forEach(([id, m]) => {
      if (m.type === 'msg' && m.nick !== myNick) db.ref('messages/' + room + '/' + id + '/seen/' + myNick).set(true);
    });
    scrollBottom();
  });
  unsubscribers[room] = () => msgsRef.off('value', handler);
}

function showAddRoom() { document.getElementById('add-room-modal').classList.add('show'); }
function hideAddRoom() { document.getElementById('add-room-modal').classList.remove('show'); }

function createRoom() {
  const name = document.getElementById('new-room-input').value.trim().toLowerCase().replace(/\s+/g, '-');
  if (!name) return;
  if (!rooms.includes(name)) rooms.push(name);
  db.ref('rooms/' + name).set(true);
  hideAddRoom();
  document.getElementById('new-room-input').value = '';
  switchRoom(name);
  postSystemMsg(name, myNick + ' created this room');
}

// ── MESSAGES ────────────────────────────────────────────
function sendMsg() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text || !myNick) return;
  input.value = ''; input.style.height = 'auto';
  db.ref('messages/' + currentRoom).push({ nick: myNick, text: escHtml(text), type: 'msg', reactions: {}, time: firebase.database.ServerValue.TIMESTAMP });
}

function postSystemMsg(room, text) {
  db.ref('messages/' + room).push({ type: 'system', text, time: firebase.database.ServerValue.TIMESTAMP });
}

function sendPhoto(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => db.ref('messages/' + currentRoom).push({ nick: myNick, type: 'photo', imageData: e.target.result, reactions: {}, time: firebase.database.ServerValue.TIMESTAMP });
  reader.readAsDataURL(file);
}

function showLinkModal() { document.getElementById('link-modal').classList.add('show'); document.getElementById('link-input').focus(); }
function hideLinkModal() { document.getElementById('link-modal').classList.remove('show'); document.getElementById('link-input').value = ''; }

function sendLink() {
  let url = document.getElementById('link-input').value.trim();
  if (!url) return;
  if (!url.startsWith('http')) url = 'https://' + url;
  hideLinkModal();
  db.ref('messages/' + currentRoom).push({ nick: myNick, type: 'link', url: escHtml(url), reactions: {}, time: firebase.database.ServerValue.TIMESTAMP });
}

function deleteMessage(msgId) {
  if (!confirm('Delete this message?')) return;
  db.ref('messages/' + currentRoom + '/' + msgId).remove();
}

// ── REACTIONS ───────────────────────────────────────────
function addReaction(msgId, emoji) {
  const rRef = db.ref('messages/' + currentRoom + '/' + msgId + '/reactions/' + emoji);
  rRef.once('value', snap => {
    const d = snap.val() || {};
    rRef.update({ [myNick]: d[myNick] ? null : true });
  });
  openEmojiMsgId = null;
}

function togglePicker(msgId) {
  openEmojiMsgId = (openEmojiMsgId == msgId) ? null : msgId;
  document.querySelectorAll('.emoji-picker').forEach(p => p.classList.remove('show'));
  if (openEmojiMsgId !== null) { const p = document.getElementById('picker-' + msgId); if (p) p.classList.add('show'); }
}

// ── RENDER ──────────────────────────────────────────────
function renderMessage(id, m) {
  const container = document.getElementById('messages');
  if (m.type === 'system') {
    const el = document.createElement('div');
    el.className = 'sys-msg'; el.textContent = m.text;
    container.appendChild(el); return;
  }

  const isMine = m.nick === myNick;
  const group = document.createElement('div');
  group.className = 'msg-group' + (isMine ? ' mine' : '');

  const time = m.time ? new Date(m.time).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '';
  const header = document.createElement('div');
  header.className = 'msg-header';
  header.innerHTML = '<span class="msg-name' + (isMine ? ' me' : '') + '">' + escHtml(m.nick) + '</span><span class="msg-time">' + time + '</span>';
  group.appendChild(header);

  const bwrap = document.createElement('div');
  bwrap.className = 'bubble-wrap';

  const emojiBtn = document.createElement('button');
  emojiBtn.className = 'emoji-btn';
  emojiBtn.textContent = '+';
  emojiBtn.onclick = e => { e.stopPropagation(); togglePicker(id); };

  const picker = document.createElement('div');
  picker.className = 'emoji-picker';
  picker.id = 'picker-' + id;
  EMOJIS.forEach(emoji => {
    const opt = document.createElement('div');
    opt.className = 'emoji-opt'; opt.textContent = emoji;
    opt.onclick = e => { e.stopPropagation(); addReaction(id, emoji); };
    picker.appendChild(opt);
  });

  const bubbleCol = document.createElement('div');
  bubbleCol.style.cssText = 'display:flex;flex-direction:column;align-items:' + (isMine ? 'flex-end' : 'flex-start');

  const bubble = document.createElement('div');
  if (m.type === 'photo') {
    bubble.className = 'msg-bubble photo-bubble';
    const img = document.createElement('img');
    img.src = m.imageData; img.alt = 'photo';
    img.onclick = () => openLightbox(m.imageData);
    bubble.appendChild(img);
  } else if (m.type === 'link') {
    bubble.className = 'msg-bubble link-bubble';
    bubble.innerHTML = '<div class="link-icon">🔗 Link</div><a href="' + m.url + '" target="_blank" rel="noopener">' + m.url + '</a>';
  } else {
    bubble.className = 'msg-bubble';
    bubble.textContent = m.text;
  }
  bubble.style.position = 'relative';
  bubble.appendChild(picker);
  bubbleCol.appendChild(bubble);

  // Reactions
  const reactionEntries = Object.entries(m.reactions || {}).filter(([,v]) => v && Object.keys(v).length > 0);
  if (reactionEntries.length > 0) {
    const rrow = document.createElement('div');
    rrow.className = 'reaction-row';
    reactionEntries.forEach(([emoji, nicks]) => {
      const nickList = Object.keys(nicks);
      if (!nickList.length) return;
      const pill = document.createElement('div');
      pill.className = 'reaction-pill' + (nickList.includes(myNick) ? ' mine' : '');
      pill.innerHTML = emoji + ' <span class="r-count">' + nickList.length + '</span>';
      pill.onclick = () => addReaction(id, emoji);
      rrow.appendChild(pill);
    });
    bubbleCol.appendChild(rrow);
  }

  // Seen
  if (isMine) {
    const seenRow = document.createElement('div');
    seenRow.className = 'seen-row';
    const seeners = m.seen ? Object.keys(m.seen) : [];
    seenRow.innerHTML = seeners.length > 0
      ? '<span class="seen-tick">✓✓</span> Seen by ' + seeners.join(', ')
      : '<span style="color:var(--muted2)">✓ Sent</span>';
    bubbleCol.appendChild(seenRow);
  }

  // Delete button (only for own messages)
  if (isMine) {
    const delBtn = document.createElement('button');
    delBtn.className = 'delete-btn';
    delBtn.textContent = '🗑';
    delBtn.title = 'Delete';
    delBtn.onclick = e => { e.stopPropagation(); deleteMessage(id); };
    bwrap.appendChild(delBtn);
    bwrap.appendChild(bubbleCol);
  } else {
    bwrap.appendChild(bubbleCol);
    bwrap.appendChild(emojiBtn);
  }

  group.appendChild(bwrap);
  container.appendChild(group);
}

function openLightbox(src) { document.getElementById('lightbox-img').src = src; document.getElementById('lightbox').classList.add('show'); }
function closeLightbox() { document.getElementById('lightbox').classList.remove('show'); }

function scrollBottom() { const c = document.getElementById('messages'); requestAnimationFrame(() => { c.scrollTop = c.scrollHeight; }); }
function escHtml(t) { return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

document.addEventListener('click', () => {
  if (openEmojiMsgId !== null) { openEmojiMsgId = null; document.querySelectorAll('.emoji-picker').forEach(p => p.classList.remove('show')); }
});

// Event listeners
document.getElementById('join-btn').addEventListener('click', joinChat);
document.getElementById('send-btn').addEventListener('click', sendMsg);
document.getElementById('add-room-btn').addEventListener('click', showAddRoom);
document.getElementById('leave-btn').addEventListener('click', leaveChat);
document.getElementById('cancel-room-btn').addEventListener('click', hideAddRoom);
document.getElementById('create-room-btn').addEventListener('click', createRoom);
document.getElementById('photo-btn').addEventListener('click', () => document.getElementById('photo-input').click());
document.getElementById('photo-input').addEventListener('change', e => { if (e.target.files[0]) sendPhoto(e.target.files[0]); e.target.value = ''; });
document.getElementById('link-btn').addEventListener('click', showLinkModal);
document.getElementById('cancel-link-btn').addEventListener('click', hideLinkModal);
document.getElementById('send-link-btn').addEventListener('click', sendLink);
document.getElementById('link-input').addEventListener('keydown', e => { if (e.key === 'Enter') sendLink(); });
document.getElementById('msg-input').addEventListener('input', function() { this.style.height = 'auto'; this.style.height = this.scrollHeight + 'px'; });
document.getElementById('msg-input').addEventListener('keydown', function(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); } });
document.getElementById('pass-input').addEventListener('keydown', e => { if (e.key === 'Enter') joinChat(); });
document.getElementById('nick-input').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('pass-input').focus(); });
document.getElementById('confirm-input').addEventListener('keydown', e => { if (e.key === 'Enter') joinChat(); });
</script>
</body>

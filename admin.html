<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0a0a0f; color: #f0eeff; font-family: system-ui, sans-serif; min-height: 100vh; }
.login { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
.login-box { background: #13131a; border: 1px solid rgba(124,111,255,0.3); border-radius: 20px; padding: 40px; width: 320px; text-align: center; }
.login-box h2 { font-size: 1.3rem; margin-bottom: 6px; color: #f0eeff; }
.login-box p { font-size: 0.85rem; color: #9b97c0; margin-bottom: 24px; }
input[type=password] { width: 100%; background: #1c1c26; border: 1px solid rgba(124,111,255,0.3); border-radius: 10px; padding: 10px 14px; color: #f0eeff; font-size: 0.95rem; outline: none; margin-bottom: 12px; }
.btn { width: 100%; background: linear-gradient(135deg, #7c6fff, #ff6b9d); color: white; border: none; border-radius: 10px; padding: 12px; font-size: 0.95rem; font-weight: 700; cursor: pointer; }
.error { color: #f87171; font-size: 0.82rem; margin-top: 8px; }

.dashboard { display: none; padding: 24px; max-width: 1000px; margin: 0 auto; }
.header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; flex-wrap: wrap; gap: 12px; }
.header h1 { font-size: 1.4rem; background: linear-gradient(135deg, #7c6fff, #ff6b9d); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

.btn-group button {
  margin-left: 8px;
  background: rgba(124,111,255,0.1);
  border: 1px solid rgba(124,111,255,0.3);
  color: #a093f8;
  border-radius: 8px;
  padding: 6px 14px;
  cursor: pointer;
  font-size: 0.82rem;
}
.logout { background: rgba(255,100,100,0.1) !important; border: 1px solid rgba(255,100,100,0.3) !important; color: #f87171 !important; }

.stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 16px; margin-bottom: 28px; }
.stat-card { background: #13131a; border: 1px solid rgba(124,111,255,0.2); border-radius: 16px; padding: 20px; text-align: center; }
.stat-card .num { font-size: 2rem; font-weight: 800; background: linear-gradient(135deg, #7c6fff, #ff6b9d); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.stat-card .label { font-size: 0.8rem; color: #9b97c0; margin-top: 4px; }

.section { background: #13131a; border: 1px solid rgba(124,111,255,0.2); border-radius: 16px; padding: 20px; margin-bottom: 20px; }
.section h3 { color: #9b97c0; margin-bottom: 16px; text-transform: uppercase; letter-spacing: 1px; font-size: 0.78rem; }

.user-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 0;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  font-size: 0.9rem;
  gap: 12px;
}
.user-row:last-child { border-bottom: none; }

.user-info { flex: 1; min-width: 0; }
.user-name { color: #f0eeff; font-weight: 600; font-size: 1rem; }
.user-uid {
  font-size: 0.72rem;
  color: #555;
  margin-top: 2px;
  font-family: monospace;
  word-break: break-all;
}
.user-meta { color: #9b97c0; font-size: 0.82rem; margin-top: 3px; }

.badge {
  background: rgba(124,111,255,0.2);
  color: #a093f8;
  border-radius: 20px;
  padding: 3px 10px;
  font-size: 0.78rem;
  white-space: nowrap;
}
.badge.green { background: rgba(74,222,128,0.15); color: #4ade80; }

/* Delete button per user */
.delete-btn {
  background: rgba(255,80,80,0.1);
  border: 1px solid rgba(255,80,80,0.3);
  color: #f87171;
  border-radius: 8px;
  padding: 5px 10px;
  font-size: 0.78rem;
  cursor: pointer;
  white-space: nowrap;
  transition: background 0.2s;
}
.delete-btn:hover { background: rgba(255,80,80,0.25); }

.right-col { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; justify-content: flex-end; }

.loading { color: #9b97c0; font-size: 0.85rem; text-align: center; padding: 30px; }

/* Search bar */
.search-bar {
  width: 100%;
  background: #1c1c26;
  border: 1px solid rgba(124,111,255,0.3);
  border-radius: 10px;
  padding: 8px 14px;
  color: #f0eeff;
  font-size: 0.9rem;
  outline: none;
  margin-bottom: 16px;
}
</style>
</head>
<body>

<div class="login" id="login-screen">
  <div class="login-box">
    <div style="font-size:40px;margin-bottom:12px;">🛡️</div>
    <h2>CC-AI Admin</h2>
    <p>Enter password to continue</p>
    <input type="password" id="pwd-input" placeholder="Password..." onkeydown="if(event.key==='Enter')checkPwd()"/>
    <button class="btn" onclick="checkPwd()">Login</button>
    <div class="error" id="pwd-error"></div>
  </div>
</div>

<div class="dashboard" id="dashboard">
  <div class="header">
    <h1>🛡️ CC-AI Admin</h1>
    <div class="btn-group">
      <button onclick="makeNamesUnique()">🔧 Fix Duplicates</button>
      <button onclick="deleteAnonymous()">🗑️ Delete Anonymous</button>
      <button onclick="loadData()">🔄 Refresh</button>
      <button class="logout" onclick="logout()">Logout</button>
    </div>
  </div>

  <div class="stats">
    <div class="stat-card"><div class="num" id="stat-users">-</div><div class="label">Total Users</div></div>
    <div class="stat-card"><div class="num" id="stat-today">-</div><div class="label">Active Today</div></div>
    <div class="stat-card"><div class="num" id="stat-images">-</div><div class="label">Images Generated</div></div>
    <div class="stat-card"><div class="num" id="stat-chats">-</div><div class="label">Total Chats</div></div>
  </div>

  <div class="section">
    <h3>👥 All Users</h3>
    <input class="search-bar" id="search-input" placeholder="🔍 Search by name or ID..." oninput="filterUsers()"/>
    <div id="users-list"><div class="loading">Loading...</div></div>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getDatabase, ref, get, remove, set } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

const ADMIN_PASSWORD = 'chh@iy@0965044808ZA';
const DB_URL = 'https://chhaiya-ai-default-rtdb.asia-southeast1.firebasedatabase.app';

const app = initializeApp({
  apiKey: "AIzaSyDjAW6cBL6oYa1aQ1W0h-rYg4K5IgjIyso",
  authDomain: "cc-ai.firebaseapp.com",
  projectId: "cc-ai",
  databaseURL: DB_URL,
  storageBucket: "cc-ai.firebasestorage.app",
  messagingSenderId: "175026548123",
  appId: "1:175026548123:web:8392f79ae02bc212c3453e"
});

const db = getDatabase(app);

// Store all users globally for search filtering
let allUsers = [];
let allUserKeys = {}; // name -> firebase key mapping

window.checkPwd = () => {
  const pwd = document.getElementById('pwd-input').value;
  if (pwd === ADMIN_PASSWORD) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    sessionStorage.setItem('admin_auth', '1');
    loadData();
  } else {
    document.getElementById('pwd-error').textContent = '❌ Wrong password!';
    document.getElementById('pwd-input').value = '';
  }
};

window.logout = () => {
  sessionStorage.removeItem('admin_auth');
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('dashboard').style.display = 'none';
};

if (sessionStorage.getItem('admin_auth')) {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
}

// ====================== DELETE SINGLE USER ======================
window.deleteUser = async (firebaseKey, displayName) => {
  if (!confirm(`Delete user "${displayName}"?\n\nThis will remove them from the database permanently.`)) return;
  try {
    await remove(ref(db, 'users/' + firebaseKey));
    // Also remove their reserved username
    const nameLower = displayName.toLowerCase().trim();
    await remove(ref(db, 'usernames/' + nameLower)).catch(() => {});
    loadData();
  } catch(e) {
    alert('Error deleting user: ' + e.message);
  }
};

// ====================== SEARCH/FILTER ======================
window.filterUsers = () => {
  const q = document.getElementById('search-input').value.toLowerCase().trim();
  const filtered = q
    ? allUsers.filter(u =>
        (u.name || '').toLowerCase().includes(q) ||
        (u.uid || '').toLowerCase().includes(q) ||
        (u._firebaseKey || '').toLowerCase().includes(q)
      )
    : allUsers;
  renderUsers(filtered);
};

// ====================== RENDER USERS ======================
function renderUsers(users) {
  const today = new Date().toDateString();
  const usersList = document.getElementById('users-list');

  if (users.length === 0) {
    usersList.innerHTML = '<div class="loading">No users found.</div>';
    return;
  }

  usersList.innerHTML = users.map(u => {
    const time = u.lastSeen ? new Date(u.lastSeen).toLocaleString() : 'Unknown';
    const isToday = u.date === today;
    const displayName = u.name || 'Anonymous';

    // Show the FULL uid (the actual user ID stored in Firebase)
    // _firebaseKey is the database path key
    const fullUid = u.uid || u._firebaseKey || 'no-id';
    const firebaseKey = u._firebaseKey;

    return `<div class="user-row" id="row-${firebaseKey}">
      <div class="user-info">
        <div class="user-name">${displayName}</div>
        <div class="user-uid">ID: ${fullUid}</div>
        <div class="user-meta">Last seen: ${time}</div>
      </div>
      <div class="right-col">
        ${u.images ? `<span class="badge">🎨 ${u.images}</span>` : ''}
        ${u.chats ? `<span class="badge">💬 ${u.chats}</span>` : ''}
        <span class="badge ${isToday ? 'green' : ''}">${isToday ? '🟢 Today' : '⚪ Inactive'}</span>
        <button class="delete-btn" onclick="deleteUser('${firebaseKey}', '${displayName.replace(/'/g, "\\'")}')">🗑️ Delete</button>
      </div>
    </div>`;
  }).join('');
}

// ====================== FIX DUPLICATE NAMES ======================
window.makeNamesUnique = async () => {
  if (!confirm('This will keep ONLY ONE user per name and delete all duplicates.\n\nContinue?')) return;
  try {
    const snap = await get(ref(db, 'users'));
    const data = snap.val() || {};
    const seen = new Map();
    let deleted = 0;

    for (const [key, user] of Object.entries(data)) {
      let name = (user.name || 'Anonymous').toLowerCase().trim();
      if (seen.has(name)) {
        await remove(ref(db, 'users/' + key));
        deleted++;
      } else {
        seen.set(name, key);
        await set(ref(db, 'usernames/' + name), key);
      }
    }

    alert(`✅ Done!\nDeleted ${deleted} duplicate users.`);
    loadData();
  } catch(e) {
    alert('Error: ' + e.message);
  }
};

// ====================== DELETE ANONYMOUS ======================
window.deleteAnonymous = async () => {
  if (!confirm('Delete all Anonymous users?')) return;
  try {
    const snap = await get(ref(db, 'users'));
    const data = snap.val() || {};
    let count = 0;
    for (const [key, u] of Object.entries(data)) {
      if (!u.name || u.name.toLowerCase() === 'anonymous') {
        await remove(ref(db, 'users/' + key));
        count++;
      }
    }
    alert(`✅ Deleted ${count} anonymous users!`);
    loadData();
  } catch(e) {
    alert('Error: ' + e.message);
  }
};

// ====================== LOAD DATA ======================
window.loadData = async () => {
  try {
    const snap = await get(ref(db, 'users'));
    const data = snap.val() || {};
    const today = new Date().toDateString();

    // Attach firebase key to each user object so we can delete by key
    allUsers = Object.entries(data).map(([key, u]) => ({
      ...u,
      _firebaseKey: key
    }));

    // Sort newest first
    allUsers.sort((a, b) => (b.lastSeen || 0) - (a.lastSeen || 0));

    // Update stats
    document.getElementById('stat-users').textContent = allUsers.length;
    document.getElementById('stat-today').textContent = allUsers.filter(u => u.date === today).length;
    document.getElementById('stat-images').textContent = allUsers.reduce((s, u) => s + (u.images || 0), 0);
    document.getElementById('stat-chats').textContent = allUsers.reduce((s, u) => s + (u.chats || 0), 0);

    if (allUsers.length === 0) {
      document.getElementById('users-list').innerHTML = '<div class="loading">No users yet.</div>';
      return;
    }

    renderUsers(allUsers);
  } catch(e) {
    document.getElementById('users-list').innerHTML = `<div class="loading">❌ Error: ${e.message}</div>`;
  }
};

if (sessionStorage.getItem('admin_auth')) loadData();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0a0a0f; color: #f0eeff; font-family: system-ui, sans-serif; min-height: 100vh; }
.login { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
.login-box { background: #13131a; border: 1px solid rgba(124,111,255,0.3); border-radius: 20px; padding: 40px; width: 320px; text-align: center; }
.login-box h2 { font-size: 1.3rem; margin-bottom: 6px; color: #f0eeff; }
.login-box p { font-size: 0.85rem; color: #9b97c0; margin-bottom: 24px; }
input[type=password] { width: 100%; background: #1c1c26; border: 1px solid rgba(124,111,255,0.3); border-radius: 10px; padding: 10px 14px; color: #f0eeff; font-size: 0.95rem; outline: none; margin-bottom: 12px; }
.btn { width: 100%; background: linear-gradient(135deg, #7c6fff, #ff6b9d); color: white; border: none; border-radius: 10px; padding: 12px; font-size: 0.95rem; font-weight: 700; cursor: pointer; }
.error { color: #f87171; font-size: 0.82rem; margin-top: 8px; }

.dashboard { display: none; padding: 24px; max-width: 1000px; margin: 0 auto; }
.header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; flex-wrap: wrap; gap: 12px; }
.header h1 { font-size: 1.4rem; background: linear-gradient(135deg, #7c6fff, #ff6b9d); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

.btn-group button {
  margin-left: 8px;
  background: rgba(124,111,255,0.1); 
  border: 1px solid rgba(124,111,255,0.3); 
  color: #a093f8; 
  border-radius: 8px; 
  padding: 6px 14px; 
  cursor: pointer; 
  font-size: 0.82rem;
}
.logout { background: rgba(255,100,100,0.1); border: 1px solid rgba(255,100,100,0.3); color: #f87171; }

.stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 16px; margin-bottom: 28px; }
.stat-card { background: #13131a; border: 1px solid rgba(124,111,255,0.2); border-radius: 16px; padding: 20px; text-align: center; }
.stat-card .num { font-size: 2rem; font-weight: 800; background: linear-gradient(135deg, #7c6fff, #ff6b9d); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.stat-card .label { font-size: 0.8rem; color: #9b97c0; margin-top: 4px; }

.section { background: #13131a; border: 1px solid rgba(124,111,255,0.2); border-radius: 16px; padding: 20px; margin-bottom: 20px; }
.section h3 { color: #9b97c0; margin-bottom: 16px; text-transform: uppercase; letter-spacing: 1px; font-size: 0.78rem; }

.user-row { 
  display: flex; 
  align-items: center; 
  justify-content: space-between; 
  padding: 12px 0; 
  border-bottom: 1px solid rgba(255,255,255,0.05); 
  font-size: 0.9rem; 
}
.user-row:last-child { border-bottom: none; }

.user-name { 
  color: #f0eeff; 
  font-weight: 600; 
  font-size: 1rem;
}
.user-id { 
  font-size: 0.78rem; 
  color: #777; 
  margin-left: 10px;
}
.user-meta { color: #9b97c0; font-size: 0.82rem; margin-top: 2px; }

.badge { 
  background: rgba(124,111,255,0.2); 
  color: #a093f8; 
  border-radius: 20px; 
  padding: 3px 10px; 
  font-size: 0.78rem; 
  margin-left: 6px;
}
.badge.green { background: rgba(74,222,128,0.15); color: #4ade80; }

.loading { color: #9b97c0; font-size: 0.85rem; text-align: center; padding: 30px; }
</style>
</head>
<body>

<div class="login" id="login-screen">
  <div class="login-box">
    <div style="font-size:40px;margin-bottom:12px;">🛡️</div>
    <h2>CC-AI Admin</h2>
    <p>Enter password to continue</p>
    <input type="password" id="pwd-input" placeholder="Password..." onkeydown="if(event.key==='Enter')checkPwd()"/>
    <button class="btn" onclick="checkPwd()">Login</button>
    <div class="error" id="pwd-error"></div>
  </div>
</div>

<div class="dashboard" id="dashboard">
  <div class="header">
    <h1>🛡️ CC-AI Admin</h1>
    <div class="btn-group">
      <button onclick="makeNamesUnique()">🔧 Fix Duplicate Names</button>
      <button onclick="deleteAnonymous()">🗑️ Delete Anonymous</button>
      <button onclick="loadData()">🔄 Refresh</button>
      <button class="logout" onclick="logout()">Logout</button>
    </div>
  </div>

  <div class="stats">
    <div class="stat-card"><div class="num" id="stat-users">-</div><div class="label">Total Users</div></div>
    <div class="stat-card"><div class="num" id="stat-today">-</div><div class="label">Active Today</div></div>
    <div class="stat-card"><div class="num" id="stat-images">-</div><div class="label">Images Generated</div></div>
    <div class="stat-card"><div class="num" id="stat-chats">-</div><div class="label">Total Chats</div></div>
  </div>

  <div class="section">
    <h3>👥 All Users (One name per device)</h3>
    <input class="search-bar" id="search-input" placeholder="🔍 Search by name or ID..." oninput="filterUsers()" style="width:100%;background:#1c1c26;border:1px solid rgba(124,111,255,0.3);border-radius:10px;padding:8px 14px;color:#f0eeff;font-family:'Inter',sans-serif;font-size:0.9rem;outline:none;margin-bottom:16px;display:block;"/>
    <div id="users-list"><div class="loading">Loading...</div></div>
  </div>

  <div class="section">
    <h3>💬 User Feedback</h3>
    <div id="feedback-list"><div class="loading">Loading...</div></div>
  </div>

  <div class="section">
    <h3>⭐ Recent Ratings</h3>
    <div id="ratings-list"><div class="loading">Loading...</div></div>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getDatabase, ref, get, remove, set } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

const ADMIN_PASSWORD = 'chh@iy@0965044808ZA';
const DB_URL = 'https://chhaiya-ai-default-rtdb.asia-southeast1.firebasedatabase.app';

const app = initializeApp({
  apiKey: "AIzaSyDjAW6cBL6oYa1aQ1W0h-rYg4K5IgjIyso",
  authDomain: "cc-ai.firebaseapp.com",
  projectId: "cc-ai",
  databaseURL: DB_URL,
  storageBucket: "cc-ai.firebasestorage.app",
  messagingSenderId: "175026548123",
  appId: "1:175026548123:web:8392f79ae02bc212c3453e"
});

const db = getDatabase(app);

window.checkPwd = () => {
  const pwd = document.getElementById('pwd-input').value;
  if (pwd === ADMIN_PASSWORD) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    sessionStorage.setItem('admin_auth', '1');
    loadData();
  } else {
    document.getElementById('pwd-error').textContent = '❌ Wrong password!';
    document.getElementById('pwd-input').value = '';
  }
};

window.logout = () => {
  sessionStorage.removeItem('admin_auth');
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('dashboard').style.display = 'none';
};

if (sessionStorage.getItem('admin_auth')) {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
}

// ====================== FIX DUPLICATE NAMES ======================
window.makeNamesUnique = async () => {
  if (!confirm('This will keep ONLY ONE user per name and delete all duplicates.\n\nContinue?')) return;

  try {
    const snap = await get(ref(db, 'users'));
    const data = snap.val() || {};
    const seen = new Map();
    let deleted = 0;

    for (const [uid, user] of Object.entries(data)) {
      let name = (user.name || 'Anonymous').toLowerCase().trim();
      if (!name) name = 'anonymous';

      if (seen.has(name)) {
        // Delete duplicate
        await remove(ref(db, 'users/' + uid));
        deleted++;
      } else {
        seen.set(name, uid);
        // Reserve this name so no one else can use it
        await set(ref(db, 'usernames/' + name), uid);
      }
    }

    alert(`✅ Done!\nDeleted ${deleted} duplicate users.\nNames are now unique.`);
    loadData();
  } catch(e) {
    alert('Error: ' + e.message);
  }
};

// ====================== DELETE ANONYMOUS ======================
window.deleteAnonymous = async () => {
  if (!confirm('Delete all Anonymous users?')) return;
  try {
    const snap = await get(ref(db, 'users'));
    const data = snap.val() || {};
    let count = 0;
    for (const [uid, u] of Object.entries(data)) {
      if (!u.name || u.name.toLowerCase() === 'anonymous') {
        await remove(ref(db, 'users/' + uid));
        count++;
      }
    }
    alert(`✅ Deleted ${count} anonymous users!`);
    loadData();
  } catch(e) {
    alert('Error: ' + e.message);
  }
};

// ====================== LOAD DATA ======================
window.loadData = async () => {
  try {
    const usersRef = ref(db, 'users');
    const snap = await get(usersRef);
    const data = snap.val() || {};
    const users = Object.values(data);
    const today = new Date().toDateString();

    const totalUsers = users.length;
    const activeToday = users.filter(u => u.date === today).length;
    const totalImages = users.reduce((sum, u) => sum + (u.images || 0), 0);
    const totalChats = users.reduce((sum, u) => sum + (u.chats || 0), 0);

    document.getElementById('stat-users').textContent = totalUsers;
    document.getElementById('stat-today').textContent = activeToday;
    document.getElementById('stat-images').textContent = totalImages;
    document.getElementById('stat-chats').textContent = totalChats;

    const usersList = document.getElementById('users-list');
    if (users.length === 0) {
      usersList.innerHTML = '<div class="loading">No users yet — visit your AI to start tracking!</div>';
      return;
    }

    // Sort by last seen (newest first)
    users.sort((a, b) => (b.lastSeen || 0) - (a.lastSeen || 0));

    usersList.innerHTML = users.map(u => {
      const time = u.lastSeen ? new Date(u.lastSeen).toLocaleString() : 'Unknown';
      const isToday = u.date === today;
      const displayName = u.name || 'Anonymous';
      const userId = u.uid ? u.uid.substring(0, 8) + '...' : 'no-id';

      return `<div class="user-row">
        <div>
          <div class="user-name">${displayName} <span class="user-id">(${userId})</span></div>
          <div class="user-meta">Last seen: ${time}</div>
        </div>
        <div style="display:flex;gap:6px;align-items:center;">
          ${u.images ? `<span class="badge">🎨 ${u.images}</span>` : ''}
          ${u.chats ? `<span class="badge">💬 ${u.chats}</span>` : ''}
          <span class="badge ${isToday ? 'green' : ''}">${isToday ? '🟢 Today' : '⚪ Inactive'}</span>
        </div>
      </div>`;
    }).join('');

  } catch(e) {
    document.getElementById('users-list').innerHTML = `<div class="loading">❌ Error: ${e.message}</div>`;
  }

  // Load feedback
  try {
    const fbSnap = await get(ref(db, 'feedback'));
    const fbData = fbSnap.val() || {};
    const feedbacks = Object.values(fbData).sort((a,b) => (b.time||0)-(a.time||0)).slice(0,20);
    const fbList = document.getElementById('feedback-list');
    if (feedbacks.length === 0) {
      fbList.innerHTML = '<div class="loading">No feedback yet.</div>';
    } else {
      fbList.innerHTML = feedbacks.map(f => `
        <div class="user-row">
          <div>
            <div class="user-name">${f.rating || 'No rating'} <span style="font-size:0.78rem;color:#777;">— ${f.name || 'Anonymous'}</span></div>
            <div class="user-meta">${f.text || '<em>No message</em>'}</div>
            <div class="user-meta">${f.date || ''}</div>
          </div>
        </div>`).join('');
    }
  } catch(e) {
    document.getElementById('feedback-list').innerHTML = `<div class="loading">❌ ${e.message}</div>`;
  }

  // Load ratings
  try {
    const rSnap = await get(ref(db, 'ratings'));
    const rData = rSnap.val() || {};
    const ratings = Object.values(rData).sort((a,b) => (b.time||0)-(a.time||0)).slice(0,20);
    const rList = document.getElementById('ratings-list');
    if (ratings.length === 0) {
      rList.innerHTML = '<div class="loading">No ratings yet.</div>';
    } else {
      const avg = ratings.reduce((s,r) => s + (r.stars||0), 0) / ratings.length;
      rList.innerHTML = `<div style="font-size:0.85rem;color:#9b97c0;margin-bottom:12px;">Average: ${'⭐'.repeat(Math.round(avg))} (${avg.toFixed(1)}/5 from ${ratings.length} ratings)</div>` +
        ratings.map(r => `
          <div class="user-row">
            <div>
              <div class="user-name">${'⭐'.repeat(r.stars||0)} ${r.stars}/5</div>
              <div class="user-meta">Q: ${r.userAsked || '—'}</div>
              <div class="user-meta">A: ${(r.aiReply||'').slice(0,80)}...</div>
            </div>
          </div>`).join('');
    }
  } catch(e) {
    document.getElementById('ratings-list').innerHTML = `<div class="loading">❌ ${e.message}</div>`;
  }
};

if (sessionStorage.getItem('admin_auth')) loadData();
</script>
</body>
</html>

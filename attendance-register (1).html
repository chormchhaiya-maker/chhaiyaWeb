<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>10(ICT)អវត្តមាន</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f4f1eb; --surface: #ffffff; --surface2: #faf8f4; --border: #e2ddd4;
  --ink: #1a1714; --ink2: #5c5650; --ink3: #9c958e;
  --green: #2d6a4f; --green-light: #d8f3dc; --red: #c1121f; --red-light: #ffe5e5;
  --gold: #b5830a; --gold-light: #fff3cd; --blue: #1d5fa4; --blue-light: #dbeafe; --accent: #c94b1e;
}
@keyframes bgShift { 0%,100%{background-position:0% 50%} 50%{background-position:100% 50%} }
@keyframes floatBubble { 0%{transform:translateY(110vh) scale(0.8);opacity:0} 10%{opacity:0.15} 90%{opacity:0.1} 100%{transform:translateY(-10vh) scale(1.1);opacity:0} }
@keyframes rowIn { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
body { background:linear-gradient(135deg,#0f0c29,#302b63,#24243e,#1a1a2e,#16213e,#0f3460); background-size:400% 400%; animation:bgShift 10s ease infinite; color:var(--ink); font-family:'Outfit',sans-serif; min-height:100vh; padding:32px 16px 64px; overflow-x:hidden; }
body::before { content:''; position:fixed; inset:0; background-image:repeating-linear-gradient(0deg,transparent,transparent 39px,rgba(255,255,255,0.03) 39px,rgba(255,255,255,0.03) 40px),repeating-linear-gradient(90deg,transparent,transparent 39px,rgba(255,255,255,0.02) 39px,rgba(255,255,255,0.02) 40px); pointer-events:none; z-index:0; }
.bubble { position:fixed; border-radius:50%; background:rgba(255,255,255,0.07); animation:floatBubble linear infinite; pointer-events:none; z-index:0; }
.wrap { max-width:900px; margin:0 auto; position:relative; z-index:1; }
.sync-bar { display:flex; align-items:center; gap:8px; background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.15); border-radius:8px; padding:8px 14px; margin-bottom:20px; font-size:12px; color:rgba(255,255,255,0.7); font-family:'JetBrains Mono',monospace; justify-content:space-between; }
.sync-dot { width:8px; height:8px; border-radius:50%; background:#4ade80; box-shadow:0 0 6px #4ade80; animation:pulse 2s infinite; }
.sync-dot.offline { background:#f87171; box-shadow:0 0 6px #f87171; }
.admin-badge { display:inline-flex; align-items:center; gap:6px; background:rgba(201,75,30,0.15); border:1px solid var(--accent); color:var(--accent); font-size:11px; font-weight:700; letter-spacing:1px; padding:4px 12px; border-radius:20px; cursor:pointer; transition:all 0.2s; }
.admin-badge:hover { background:rgba(201,75,30,0.25); }
.header { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:36px; flex-wrap:wrap; gap:16px; }
.stamp { display:inline-flex; align-items:center; gap:6px; background:var(--accent); color:#fff; font-size:10px; font-weight:700; letter-spacing:2.5px; text-transform:uppercase; padding:5px 12px; border-radius:2px; margin-bottom:10px; }
h1 { font-size:clamp(28px,6vw,48px); font-weight:800; letter-spacing:-1.5px; line-height:1; color:var(--ink); }
h1 em { color:var(--accent); font-style:normal; }
.date-display { font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--ink3); margin-top:8px; }
.stats-row { display:flex; gap:12px; flex-wrap:wrap; }
.stat-box { background:var(--surface); border:1.5px solid var(--border); border-radius:12px; padding:14px 20px; text-align:center; min-width:80px; }
.stat-num { font-size:24px; font-weight:800; line-height:1; font-family:'JetBrains Mono',monospace; }
.stat-label { font-size:10px; font-weight:600; letter-spacing:1px; text-transform:uppercase; color:var(--ink3); margin-top:4px; }
.stat-box.present .stat-num { color:var(--green); } .stat-box.absent .stat-num { color:var(--red); } .stat-box.total .stat-num { color:var(--blue); }
.form-card { background:var(--surface); border:1.5px solid var(--border); border-radius:16px; padding:28px; margin-bottom:28px; box-shadow:0 2px 12px rgba(0,0,0,0.06); }
.form-title { font-size:13px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--ink3); margin-bottom:20px; display:flex; align-items:center; gap:8px; }
.form-title::before { content:''; width:3px; height:14px; background:var(--accent); border-radius:2px; display:inline-block; }
.form-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
@media(max-width:500px){.form-grid{grid-template-columns:1fr}}
.field { display:flex; flex-direction:column; gap:6px; }
label { font-size:11px; font-weight:600; letter-spacing:1px; text-transform:uppercase; color:var(--ink2); }
input[type="text"],input[type="date"],select { background:var(--surface2); border:1.5px solid var(--border); border-radius:10px; padding:11px 14px; font-family:'Outfit',sans-serif; font-size:14px; color:var(--ink); outline:none; transition:border-color 0.2s,box-shadow 0.2s; width:100%; }
input[type="text"]:focus,input[type="date"]:focus,select:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(201,75,30,0.1); background:#fff; }
.gender-group { display:flex; gap:10px; }
.gender-btn { flex:1; padding:10px; border:1.5px solid var(--border); border-radius:10px; background:var(--surface2); font-family:'Outfit',sans-serif; font-size:13px; font-weight:600; cursor:pointer; transition:all 0.2s; color:var(--ink2); text-align:center; }
.gender-btn.active-male { border-color:var(--blue); background:var(--blue-light); color:var(--blue); }
.gender-btn.active-female { border-color:#be185d; background:#fce7f3; color:#be185d; }
.add-btn { width:100%; margin-top:20px; background:var(--ink); color:#fff; border:none; border-radius:10px; padding:14px; font-family:'Outfit',sans-serif; font-size:15px; font-weight:700; cursor:pointer; transition:background 0.2s,transform 0.1s; }
.add-btn:hover { background:var(--accent); transform:translateY(-1px); }
.add-btn:disabled { background:#aaa; cursor:not-allowed; transform:none; }
.table-card { background:var(--surface); border:1.5px solid var(--border); border-radius:16px; overflow:hidden; box-shadow:0 2px 12px rgba(0,0,0,0.06); }
.table-header { display:flex; align-items:center; justify-content:space-between; padding:20px 24px; border-bottom:1.5px solid var(--border); flex-wrap:wrap; gap:12px; }
.table-title { font-size:13px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--ink3); display:flex; align-items:center; gap:8px; }
.table-title::before { content:''; width:3px; height:14px; background:var(--green); border-radius:2px; display:inline-block; }
.search-box { background:var(--surface2); border:1.5px solid var(--border); border-radius:8px; padding:8px 14px; font-family:'Outfit',sans-serif; font-size:13px; color:var(--ink); outline:none; width:200px; transition:border-color 0.2s; }
.search-box:focus { border-color:var(--accent); }
.table-wrap { overflow-x:auto; }
table { width:100%; border-collapse:collapse; font-size:13.5px; }
thead th { background:var(--surface2); padding:12px 16px; text-align:left; font-size:10px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--ink3); border-bottom:1.5px solid var(--border); white-space:nowrap; }
tbody tr { border-bottom:1px solid var(--border); transition:background 0.15s; }
tbody tr:last-child { border-bottom:none; } tbody tr:hover { background:var(--surface2); }
td { padding:13px 16px; vertical-align:middle; white-space:nowrap; }
.num-cell { font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--ink3); font-weight:600; }
.name-cell { font-weight:600; color:var(--ink); } .dob-cell { font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--ink2); }
.gender-badge { display:inline-flex; align-items:center; gap:4px; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:700; }
.gender-m { background:var(--blue-light); color:var(--blue); } .gender-f { background:#fce7f3; color:#be185d; }
.attend-cell { text-align:center; }
.attend-check { width:26px; height:26px; border:2px solid var(--border); border-radius:6px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.2s; background:var(--surface2); font-size:14px; user-select:none; }
.attend-check.present { background:var(--green-light); border-color:var(--green); color:var(--green); }
.attend-check.absent { background:var(--red-light); border-color:var(--red); color:var(--red); }
.status-badge { display:inline-block; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:700; }
.status-present { background:var(--green-light); color:var(--green); } .status-absent { background:var(--red-light); color:var(--red); } .status-none { background:var(--gold-light); color:var(--gold); }
.del-btn { background:none; border:1.5px solid var(--border); color:var(--ink3); width:28px; height:28px; border-radius:7px; cursor:pointer; font-size:13px; display:flex; align-items:center; justify-content:center; transition:all 0.2s; }
.del-btn:hover { border-color:var(--red); color:var(--red); background:var(--red-light); }
.empty-row td { text-align:center; padding:48px; color:var(--ink3); font-size:14px; }
.empty-icon { font-size:32px; display:block; margin-bottom:8px; }
.toast { position:fixed; bottom:24px; right:24px; background:var(--ink); color:#fff; padding:12px 20px; border-radius:10px; font-size:13px; font-weight:500; box-shadow:0 8px 24px rgba(0,0,0,0.2); transform:translateY(80px); opacity:0; transition:all 0.3s ease; z-index:9998; }
.toast.show { transform:translateY(0); opacity:1; }
tr.new-row { animation:rowIn 0.3s ease forwards; }
.lock-overlay { position:fixed; inset:0; background:rgba(10,8,30,0.92); backdrop-filter:blur(8px); z-index:9999; display:flex; align-items:center; justify-content:center; }
.lock-box { background:var(--surface); border:1.5px solid var(--border); border-radius:20px; padding:40px 36px; text-align:center; width:100%; max-width:340px; box-shadow:0 24px 60px rgba(0,0,0,0.5); }
.lock-icon { font-size:48px; margin-bottom:12px; } .lock-title { font-size:20px; font-weight:800; color:var(--ink); margin-bottom:4px; } .lock-sub { font-size:13px; color:var(--ink3); margin-bottom:24px; }
.lock-input { width:100%; background:var(--surface2); border:1.5px solid var(--border); border-radius:10px; padding:12px 16px; font-family:'Outfit',sans-serif; font-size:15px; color:var(--ink); outline:none; text-align:center; letter-spacing:2px; margin-bottom:12px; transition:border-color 0.2s; }
.lock-input:focus { border-color:var(--accent); } .lock-input.error { border-color:var(--red); animation:shake 0.3s ease; }
.lock-btn { width:100%; background:var(--ink); color:#fff; border:none; border-radius:10px; padding:13px; font-family:'Outfit',sans-serif; font-size:15px; font-weight:700; cursor:pointer; transition:background 0.2s; margin-bottom:12px; }
.lock-btn:hover { background:var(--accent); }
.student-btn { width:100%; background:none; color:var(--ink3); border:1.5px solid var(--border); border-radius:10px; padding:11px; font-family:'Outfit',sans-serif; font-size:13px; font-weight:600; cursor:pointer; transition:all 0.2s; }
.student-btn:hover { border-color:var(--ink2); color:var(--ink2); }
</style>
</head>
<body>

<div class="lock-overlay" id="lockOverlay">
  <div class="lock-box">
    <div class="lock-icon">🔐</div>
    <div class="lock-title">10(ICT) Register</div>
    <div class="lock-sub">Admin? Enter password.<br>Student? Click below to register.</div>
    <input class="lock-input" type="password" id="lockInput" placeholder="Admin password..." />
    <button class="lock-btn" id="unlockBtn">🔓 Unlock Admin</button>
    <button class="student-btn" id="studentBtn">👤 I am a Student — Register</button>
  </div>
</div>

<div id="bubbles"></div>
<div class="wrap">
  <div class="sync-bar">
    <div style="display:flex;align-items:center;gap:8px;">
      <div class="sync-dot" id="syncDot"></div>
      <span id="syncText">Connecting...</span>
    </div>
    <span class="admin-badge" id="adminBadge" style="display:none;">🔐 Admin — Click to Lock</span>
  </div>

  <div class="header">
    <div class="header-left">
      <div class="stamp">💻 10(ICT)</div>
      <h1>10 <em>(ICT)</em><br>បញ្ចីអវត្តមាន</h1>
      <div class="date-display" id="dateDisplay"></div>
      <div class="date-display" id="countdown" style="margin-top:4px;color:#a78bff;"></div>
    </div>
    <div class="stats-row">
      <div class="stat-box total"><div class="stat-num" id="statTotal">0</div><div class="stat-label">Total</div></div>
      <div class="stat-box present"><div class="stat-num" id="statPresent">0</div><div class="stat-label">Present</div></div>
      <div class="stat-box absent"><div class="stat-num" id="statAbsent">0</div><div class="stat-label">Absent</div></div>
    </div>
  </div>

  <!-- Form: always visible for everyone to register -->
  <div class="form-card" id="formCard">
    <div class="form-title" id="formTitle">Register Yourself</div>
    <div class="form-grid">
      <div class="field">
        <label>Full Name</label>
        <input type="text" id="inputName" placeholder="បំពេញឈ្មោះរបស់អ្នក" maxlength="50" />
      </div>
      <div class="field">
        <label>Date of Birth</label>
        <input type="date" id="inputDob" />
      </div>
      <div class="field">
        <label>Gender</label>
        <div class="gender-group">
          <button class="gender-btn" id="btnMale">♂ Male</button>
          <button class="gender-btn" id="btnFemale">♀ Female</button>
        </div>
      </div>
      <div class="field" id="attendField" style="display:none;">
        <label>Attendance</label>
        <select id="inputAttend">
          <option value="">— Not marked yet —</option>
          <option value="Present">✅​ បានមក</option>
          <option value="Absent">❌ មិនបានមក</option>
        </select>
      </div>
    </div>
    <button class="add-btn" id="addBtn">បញ្ចូន</button>
  </div>

  <div class="table-card">
    <div class="table-header">
      <div class="table-title">Student List</div>
      <input class="search-box" type="text" id="searchBox" placeholder="🔍 Search name..." />
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th><th>Full Name</th><th>Date of Birth</th><th>Age</th>
            <th>Gender</th><th style="text-align:center">✔ Attended</th><th>Status</th><th></th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr class="empty-row"><td colspan="8"><span class="empty-icon">⏳</span>Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, collection, addDoc, deleteDoc, updateDoc, doc, onSnapshot, query, orderBy, getDocs, writeBatch }
  from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBLpeuXBAFeG7fVJyc3IMV6cHgi-PeglOY",
  authDomain: "attendance-tpn10ict.firebaseapp.com",
  projectId: "attendance-tpn10ict",
  storageBucket: "attendance-tpn10ict.firebasestorage.app",
  messagingSenderId: "329982092302",
  appId: "1:329982092302:web:7a9954a9f1492196c1485f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const ADMIN_PASSWORD = '015606408ZA';
let students = [];
let selectedGender = '';
let isAdmin = false;

// ---- Helpers ----
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}
function calcAge(dob) {
  if (!dob) return '—';
  return Math.floor((Date.now() - new Date(dob).getTime()) / (1000*60*60*24*365.25));
}
function formatDob(dob) {
  if (!dob) return '—';
  return new Date(dob+'T00:00:00').toLocaleDateString('en-US',{day:'2-digit',month:'short',year:'numeric'});
}
function escapeHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function setSyncStatus(on) {
  document.getElementById('syncDot').className = 'sync-dot'+(on?'':' offline');
  document.getElementById('syncText').textContent = on ? '🔴 Live — Everyone sees this in real-time' : 'Offline — Reconnecting...';
}
function updateStats() {
  document.getElementById('statTotal').textContent = students.length;
  document.getElementById('statPresent').textContent = students.filter(s=>s.attendance==='Present').length;
  document.getElementById('statAbsent').textContent = students.filter(s=>s.attendance==='Absent').length;
}

// ---- Render table ----
function renderTable() {
  const q = document.getElementById('searchBox').value.toLowerCase();
  const filtered = students.filter(s => s.name.toLowerCase().includes(q));
  const tbody = document.getElementById('tableBody');
  if (!filtered.length) {
    tbody.innerHTML = '<tr class="empty-row"><td colspan="8"><span class="empty-icon">📭</span>'+(students.length===0?'No students yet!':'No results.')+' </td></tr>';
    return;
  }
  tbody.innerHTML = filtered.map((s,i) => {
    const cc = s.checked?'attend-check present':s.attendance==='Absent'?'attend-check absent':'attend-check';
    const ci = s.checked?'✓':s.attendance==='Absent'?'✗':'';
    const sc = s.attendance==='Present'?'status-present':s.attendance==='Absent'?'status-absent':'status-none';
    const gc = s.gender==='Male'?'gender-m':'gender-f';
    const gi = s.gender==='Male'?'♂':'♀';
    const checkClick = isAdmin ? `onclick="window.__toggle('${s.id}')" style="cursor:pointer"` : `style="cursor:default"`;
    const delBtn = isAdmin ? `<button class="del-btn" onclick="window.__del('${s.id}')">✕</button>` : '';
    return `<tr>
      <td class="num-cell">${i+1}</td>
      <td class="name-cell">${escapeHtml(s.name)}</td>
      <td class="dob-cell">${formatDob(s.dob)}</td>
      <td class="dob-cell">${calcAge(s.dob)}</td>
      <td><span class="gender-badge ${gc}">${gi} ${s.gender}</span></td>
      <td class="attend-cell"><div class="${cc}" ${checkClick}>${ci}</div></td>
      <td><span class="status-badge ${sc}">${s.attendance||'Pending'}</span></td>
      <td>${delBtn}</td>
    </tr>`;
  }).join('');
}

// ---- Gender buttons ----
document.getElementById('btnMale').onclick = () => {
  selectedGender = 'Male';
  document.getElementById('btnMale').className = 'gender-btn active-male';
  document.getElementById('btnFemale').className = 'gender-btn';
};
document.getElementById('btnFemale').onclick = () => {
  selectedGender = 'Female';
  document.getElementById('btnFemale').className = 'gender-btn active-female';
  document.getElementById('btnMale').className = 'gender-btn';
};

// ---- Add student ----
document.getElementById('addBtn').onclick = async () => {
  const name = document.getElementById('inputName').value.trim();
  const dob = document.getElementById('inputDob').value;
  const attend = isAdmin ? document.getElementById('inputAttend').value : '';
  if (!name) { showToast('⚠️ Please enter your name'); return; }
  if (!selectedGender) { showToast('⚠️ Please select gender'); return; }
  const btn = document.getElementById('addBtn');
  btn.disabled = true; btn.textContent = 'Adding...';
  try {
    await addDoc(collection(db,'students'), { name, dob, gender:selectedGender, attendance:attend, checked:attend==='Present', timestamp:Date.now() });
    document.getElementById('inputName').value = '';
    document.getElementById('inputDob').value = '';
    document.getElementById('inputAttend').value = '';
    selectedGender = '';
    document.getElementById('btnMale').className = 'gender-btn';
    document.getElementById('btnFemale').className = 'gender-btn';
    showToast('✅ '+name+' registered!');
  } catch(e) { showToast('❌ Error: '+e.message); }
  btn.disabled = false;
  btn.textContent = isAdmin ? '+ Add Student to Register' : '+ Register to List';
};

// ---- Search ----
document.getElementById('searchBox').oninput = renderTable;

// ---- Toggle (admin only) ----
window.__toggle = async (id) => {
  if (!isAdmin) { showToast('🔒 Admin only!'); return; }
  const s = students.find(x=>x.id===id); if (!s) return;
  const nc = !s.checked, na = nc?'Present':'Absent';
  try { await updateDoc(doc(db,'students',id),{checked:nc,attendance:na}); }
  catch(e) { showToast('❌ Update failed'); }
};

// ---- Delete (admin only) ----
window.__del = async (id) => {
  if (!isAdmin) { showToast('🔒 Admin only!'); return; }
  const s = students.find(x=>x.id===id); if (!s) return;
  if (confirm('Remove '+s.name+'?')) {
    try { await deleteDoc(doc(db,'students',id)); showToast('🗑️ Removed '+s.name); }
    catch(e) { showToast('❌ Delete failed'); }
  }
};

// ---- Admin mode ----
function setAdminMode(admin) {
  isAdmin = admin;
  document.getElementById('adminBadge').style.display = admin ? 'inline-flex' : 'none';
  document.getElementById('attendField').style.display = admin ? 'flex' : 'none';
  document.getElementById('formTitle').textContent = admin ? 'Add New Student' : 'Register Yourself';
  document.getElementById('addBtn').textContent = admin ? '+ Add Student to Register' : '+ Register to List';
  renderTable();
}

// ---- Lock buttons ----
document.getElementById('unlockBtn').onclick = () => {
  const input = document.getElementById('lockInput');
  if (input.value === ADMIN_PASSWORD) {
    document.getElementById('lockOverlay').style.display = 'none';
    setAdminMode(true);
    showToast('🔓 Admin unlocked!');
  } else {
    input.classList.add('error'); input.value = ''; input.placeholder = 'Wrong password!';
    setTimeout(()=>{ input.classList.remove('error'); input.placeholder = 'Admin password...'; }, 1500);
  }
};
document.getElementById('studentBtn').onclick = () => {
  document.getElementById('lockOverlay').style.display = 'none';
  setAdminMode(false);
  showToast('👤 Welcome! Fill in your info below.');
};
document.getElementById('lockInput').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('unlockBtn').click(); });
document.getElementById('adminBadge').onclick = () => {
  setAdminMode(false);
  document.getElementById('lockOverlay').style.display = 'flex';
  document.getElementById('lockInput').value = '';
};

// ---- Date & Countdown ----
document.getElementById('dateDisplay').textContent =
  new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
function updateCountdown() {
  const n=new Date(), m=new Date(n); m.setHours(24,0,0,0);
  const d=m-n, h=String(Math.floor(d/3600000)).padStart(2,'0'), mi=String(Math.floor((d%3600000)/60000)).padStart(2,'0'), s=String(Math.floor((d%60000)/1000)).padStart(2,'0');
  const el=document.getElementById('countdown'); if(el) el.textContent='🔄 Attendance resets in '+h+':'+mi+':'+s;
}
setInterval(updateCountdown,1000); updateCountdown();

// ---- 24h Reset attendance only (keep names) ----
async function resetAttendanceIfNeeded() {
  const today = new Date().toDateString();
  if (localStorage.getItem('fbReset') === today) return;
  try {
    const snap = await getDocs(collection(db,'students'));
    if (snap.empty) return;
    const batch = writeBatch(db);
    snap.forEach(d => batch.update(doc(db,'students',d.id), { attendance:'', checked:false }));
    await batch.commit();
    localStorage.setItem('fbReset', today);
    showToast('🔄 Attendance reset for today!');
  } catch(e) { console.error('Reset failed',e); }
}
resetAttendanceIfNeeded();
(function scheduleMidnight() {
  const now=new Date(), midnight=new Date(now); midnight.setHours(24,0,5,0);
  setTimeout(()=>{ resetAttendanceIfNeeded(); scheduleMidnight(); }, midnight-now);
})();

// ---- Real-time listener ----
const q = query(collection(db,'students'), orderBy('timestamp','asc'));
onSnapshot(q, snap => {
  students = snap.docs.map(d=>({id:d.id,...d.data()}));
  renderTable(); updateStats(); setSyncStatus(true);
}, () => setSyncStatus(false));

// Enter key in name field
document.getElementById('inputName').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('addBtn').click(); });
